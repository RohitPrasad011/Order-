<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP RESTO | Order Now</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

    <div id="loadingBar" class="fixed top-0 left-0 w-0 h-1 bg-red-600 transition-all duration-500 z-[100]"></div>

    <header class="p-6">
        <h1 class="text-3xl font-black italic tracking-tighter">VIP <span class="text-red-600">RESTO</span></h1>
        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-1">Order your favorite food</p>
    </header>

    <main class="px-6 grid grid-cols-2 gap-4" id="menuDisplay">
        </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-pNz_6HP34j97QQzUBPJrkwqB2zucq3M6y927LTNazuAapf9yE_IKat4oTfa6ApsB/exec";

        // FAST LOADING LOGIC
        async function fetchMenu() {
            const menuDisplay = document.getElementById('menuDisplay');
            const cachedMenu = localStorage.getItem('vipMenu');

            // 1. Agar cache mein menu hai, toh pehle wahi dikhao (Fast Load)
            if (cachedMenu) {
                renderMenu(JSON.parse(cachedMenu));
            }

            try {
                // 2. Background mein naya data fetch karo
                document.getElementById('loadingBar').style.width = "50%";
                const res = await fetch(SCRIPT_URL + "?action=getMenu", { redirect: 'follow' });
                const freshMenu = await res.json();
                
                // 3. Naye data ko save karo aur update karo
                localStorage.setItem('vipMenu', JSON.stringify(freshMenu));
                renderMenu(freshMenu);
                document.getElementById('loadingBar').style.width = "100%";
                setTimeout(() => document.getElementById('loadingBar').style.width = "0%", 500);
            } catch (e) {
                console.log("Menu Fetch Error");
            }
        }

        function renderMenu(items) {
            const menuDisplay = document.getElementById('menuDisplay');
            menuDisplay.innerHTML = items.map(item => `
                <div class="bg-gray-50 rounded-3xl p-3 border border-gray-100">
                    <img src="${item.img}" class="w-full h-32 object-cover rounded-2xl mb-3 shadow-sm">
                    <h3 class="font-bold text-sm text-gray-800">${item.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="font-black text-red-600">₹${item.price}</span>
                        <button class="bg-white p-2 rounded-xl shadow-sm border border-gray-100 text-xs font-bold active:scale-90 transition">+</button>
                    </div>
                </div>
            `).join('');
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
