<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP RESTO | Order Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <div class="max-w-md mx-auto p-4">
        <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100">
            <h2 class="text-xl font-black mb-4">CHECKOUT</h2>
            <div class="space-y-3">
                <input id="custName" type="text" placeholder="Full Name" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none text-sm">
                <input id="custPhone" type="number" placeholder="WhatsApp Number" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none text-sm">
                <textarea id="custAddr" placeholder="Full Address" class="w-full p-3 bg-gray-50 rounded-xl border-none outline-none text-sm h-24"></textarea>
            </div>

            <button onclick="placeOrder()" id="orderBtn" class="w-full bg-red-600 text-white font-bold py-4 rounded-2xl mt-6 shadow-xl shadow-red-100 active:scale-95 transition-all">
                PLACE ORDER
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxprlgeOXvjPYQvKzF9TVuBeohuKk8bVBC8rThIg6-txgTLGPWRCn50d-wKyCtbU4Uf/exec";

        async function placeOrder() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddr').value;
            const btn = document.getElementById('orderBtn');

            if(!name || !phone || !address) { alert("Please fill details!"); return; }

            // Temporary Static Data (Aap apne cart logic se items yaha fetch kar lena)
            const orderData = {
                action: "addOrder",
                name: name,
                phone: phone,
                address: address,
                order: "1x Burger, 2x Pizza", // Example
                total: "450", // Example
                txn: "VIP" + Math.floor(Math.random() * 99999)
            };

            btn.disabled = true;
            btn.innerText = "PLACING ORDER...";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(orderData)
                });
                
                alert("Order Placed Successfully! Your ID: " + orderData.txn);
                location.reload();
            } catch (e) {
                alert("Something went wrong!");
                btn.disabled = false;
                btn.innerText = "PLACE ORDER";
            }
        }
    </script>
</body>
</html>
