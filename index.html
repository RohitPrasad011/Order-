<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS FINAL FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 12px; position: relative; transition: 0.2s; }
        .card.selected { border: 2px solid #3b82f6; background: #1e293b; }
        .select-dot { position: absolute; top: 12px; right: 12px; width: 22px; height: 22px; border: 2px solid #374151; border-radius: 50%; }
        .selected .select-dot { background: #3b82f6; border-color: #fff; box-shadow: 0 0 10px #3b82f6; }
        .bill-box { background: #1a2234; border: 2px solid #3b82f6; border-radius: 16px; padding: 15px; margin-bottom: 20px; }
        pre { background: #000; padding: 10px; border-radius: 8px; font-size: 13px; color: #9ca3af; white-space: pre-wrap; margin-top: 8px; border: 1px solid #1f2937; }
        button { font-weight: 800; text-transform: uppercase; font-size: 11px; height: 48px; border-radius: 12px; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-center mb-6 sticky top-0 bg-[#05070a] z-50 py-3 border-b border-slate-900">
        <h1 class="text-xl font-black italic text-white tracking-tighter uppercase">POS Terminal</h1>
        <div class="flex gap-2">
            <button id="linkModeBtn" onclick="toggleSelectionMode()" class="bg-blue-600 text-white px-6">LINK BILLS</button>
            <button onclick="loadOrders()" class="bg-slate-800 text-white px-4 border border-slate-700">REFRESH</button>
        </div>
    </header>

    <div class="flex justify-between items-end mb-4">
        <h2 class="text-[10px] font-bold text-orange-500 uppercase tracking-widest">Incoming Orders</h2>
        <button id="mergeActionBtn" onclick="mergeNow()" class="hidden bg-green-600 text-white px-6 h-10 rounded-full">MERGE NOW</button>
    </div>
    <div id="incomingContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-12"></div>

    <hr class="border-slate-900 mb-10">

    <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-4">Final Table Bills</h2>
    <div id="mergedContainer" class="flex flex-col gap-6"></div>

<script>
// आपकी शीट का लिंक
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

let activeBills = JSON.parse(localStorage.getItem('pos_vFinal_active')) || {};
let historyIds = JSON.parse(localStorage.getItem('pos_vFinal_history')) || [];
let selectedItems = [];
let isSelectionMode = false;

async function loadOrders() {
    try {
        const res = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await res.text();
        const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
        
        const h = rows[0];
        const tIdx = h.indexOf("Timestamp");
        const bIdx = h.indexOf("TABLE NO.");
        const iIdx = h.indexOf("ITEMS");
        // आपकी शीट के हिसाब से 'TOTAL MOUNT' को ढूंढना
        const mIdx = h.indexOf("TOTAL MOUNT");

        const container = document.getElementById("incomingContainer");
        container.innerHTML = "";

        for (let i = rows.length - 1; i >= 1; i--) {
            let d = rows[i];
            if (d.length < 3) continue;
            let orderId = (d[tIdx] + d[bIdx]).replace(/\s+/g, '');

            if (!historyIds.includes(orderId)) {
                // यहाँ अमाउंट को सही से पकड़ना
                let price = d[mIdx] ? parseFloat(d[mIdx]) : 0;
                let isSel = selectedItems.find(s => s.id === orderId);

                container.innerHTML += `
                    <div class="card ${isSel ? 'selected' : ''}" id="card-${orderId}" onclick="handleTap('${orderId}', '${d[bIdx]}', '${encodeURIComponent(d[iIdx])}', ${price})">
                        <div class="select-dot"></div>
                        <div class="flex justify-between items-start">
                            <span class="text-slate-500 font-bold text-xs">${d[bIdx]}</span>
                            <span class="text-green-400 font-black text-xl">₹${price}</span>
                        </div>
                        <pre>${d[iIdx]}</pre>
                        <button class="bg-orange-600/20 text-orange-400 border border-orange-600/30 w-full h-8 mt-2" onclick="event.stopPropagation(); printDoc('KOT', '${d[bIdx]}', '${encodeURIComponent(d[iIdx])}')">KOT PRINT</button>
                    </div>`;
            }
        }
        renderFinal();
    } catch (e) { console.error("Error loading data"); }
}

function toggleSelectionMode() {
    isSelectionMode = !isSelectionMode;
    const btn = document.getElementById('linkModeBtn');
    const mergeBtn = document.getElementById('mergeActionBtn');
    if (isSelectionMode) {
        btn.innerText = "CANCEL"; btn.classList.replace('bg-blue-600', 'bg-red-600');
        mergeBtn.classList.remove('hidden');
    } else {
        btn.innerText = "LINK BILLS"; btn.classList.replace('bg-red-600', 'bg-blue-600');
        mergeBtn.classList.add('hidden');
        selectedItems = []; loadOrders();
    }
}

function handleTap(id, table, items, price) {
    if (!isSelectionMode) return;
    const card = document.getElementById(`card-${id}`);
    const idx = selectedItems.findIndex(s => s.id === id);
    if (idx > -1) {
        selectedItems.splice(idx, 1);
        card.classList.remove('selected');
    } else {
        selectedItems.push({ id, table, items: decodeURIComponent(items), price });
        card.classList.add('selected');
    }
}

function mergeNow() {
    if (selectedItems.length === 0) return alert("Pehle orders select karein!");
    let table = prompt("Kis Table mein merge karein?", selectedItems[0].table);
    if (!table) return;

    if (!activeBills[table]) activeBills[table] = { items: [], total: 0 };
    selectedItems.forEach(o => {
        activeBills[table].items.push(o.items);
        activeBills[table].total += o.price;
        historyIds.push(o.id);
    });
    
    toggleSelectionMode();
    save(); loadOrders();
}

function renderFinal() {
    const div = document.getElementById("mergedContainer");
    div.innerHTML = "";
    for (let t in activeBills) {
        let b = activeBills[t];
        div.innerHTML += `
            <div class="bill-box">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-2xl font-black text-white italic underline">${t}</h3>
                    <span class="text-3xl font-black text-green-400">₹${b.total}</span>
                </div>
                <pre>${b.items.join('\n---\n')}</pre>
                <div class="flex gap-3">
                    <button class="bg-white text-black flex-1" onclick="printDoc('FINAL BILL', '${t}', '${encodeURIComponent(b.items.join('\n'))}', ${b.total})">PRINT BILL</button>
                    <button class="bg-red-600 text-white flex-1" onclick="settle('${t}')">SETTLE</button>
                </div>
            </div>`;
    }
}

function printDoc(type, table, items, total = 0) {
    let w = window.open("");
    w.document.write(`<div style="font-family:monospace;width:280px;padding:10px;"><center><h2>${type}</h2><h1>${table}</h1><hr></center><pre style="white-space:pre-wrap;">${decodeURIComponent(items)}</pre>${total ? '<hr><h3>TOTAL: ₹'+total+'</h3>' : ''}</div>`);
    w.print(); w.close();
}

function settle(t) {
    if (confirm("Clear Table " + t + "?")) {
        delete activeBills[t];
        save(); loadOrders();
    }
}

function save() {
    localStorage.setItem('pos_vFinal_active', JSON.stringify(activeBills));
    localStorage.setItem('pos_vFinal_history', JSON.stringify(historyIds));
}

loadOrders();
setInterval(loadOrders, 15000);
</script>
</body>
</html>
