<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP RESTO | Order Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 pb-24">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-2xl font-black text-red-600 italic">VIP RESTO</h1>
        <div id="status" class="text-[10px] font-bold text-green-500 bg-green-50 px-2 py-1 rounded-full uppercase tracking-tighter">Kitchen Online</div>
    </header>

    <main id="menuContainer" class="p-4 space-y-4">
        <div class="text-center py-20 text-slate-400 animate-pulse">
            <i class="fa fa-utensils text-2xl mb-2"></i>
            <p class="text-xs font-bold uppercase">Loading Fresh Menu...</p>
        </div>
    </main>

    <div id="cartBar" class="hidden fixed bottom-6 left-4 right-4 bg-slate-900 text-white p-4 rounded-2xl shadow-2xl flex justify-between items-center">
        <div>
            <p id="itemCount" class="text-[10px] font-bold opacity-60 uppercase">0 Items</p>
            <p id="totalPrice" class="text-lg font-black tracking-tight">₹0</p>
        </div>
        <button onclick="toggleModal(true)" class="bg-red-600 px-6 py-3 rounded-xl font-bold text-sm shadow-lg shadow-red-900/20">Review Order <i class="fa fa-chevron-right ml-1"></i></button>
    </div>

    <div id="orderModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-end">
        <div class="bg-white w-full rounded-t-[2.5rem] p-8 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-slate-800">Delivery Info</h2>
                <button onclick="toggleModal(false)" class="text-slate-300 hover:text-slate-500"><i class="fa fa-times-circle text-2xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <input id="custName" type="text" placeholder="Your Full Name *" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm focus:ring-2 ring-red-500 outline-none">
                <input id="custWhatsApp" type="tel" placeholder="WhatsApp Number *" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm focus:ring-2 ring-red-500 outline-none">
                <div class="grid grid-cols-2 gap-4">
                    <input id="custHouse" type="text" placeholder="House/Flat No *" class="bg-slate-50 border-none p-4 rounded-2xl text-sm focus:ring-2 ring-red-500 outline-none">
                    <input id="custCity" type="text" placeholder="City/Area *" class="bg-slate-50 border-none p-4 rounded-2xl text-sm focus:ring-2 ring-red-500 outline-none">
                </div>
                <input id="custLandmark" type="text" placeholder="Landmark (e.g. Near Park) *" class="w-full bg-slate-50 border-none p-4 rounded-2xl text-sm focus:ring-2 ring-red-500 outline-none">
                
                <button id="submitOrderBtn" onclick="placeOrder()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition mt-4">PLACE ORDER</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwo-mCRLZUFLcpMvDqvyXXUktaqs4WEtHuGvwylTWgqS9BwnRWxsCzrRS7XhpnDiEyc/exec";
        let products = [];
        let cart = {};

        async function init() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getMenu");
                products = await res.json();
                renderMenu();
            } catch (e) { console.error("Menu failed to load"); }
        }

        function renderMenu() {
            const container = document.getElementById('menuContainer');
            container.innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-2xl flex shadow-sm border border-slate-100">
                    <img src="${p.img}" class="w-24 h-24 object-cover rounded-xl shadow-inner">
                    <div class="ml-4 flex-1 py-1">
                        <h3 class="font-bold text-slate-800 text-sm">${p.name}</h3>
                        <p class="text-[10px] text-slate-400 line-clamp-1 mb-3">${p.desc || ''}</p>
                        <div class="flex justify-between items-center">
                            <span class="font-black text-slate-900 text-base">₹${p.price}</span>
                            <div id="ctrl-${p.name.replace(/\s+/g, '')}">
                                <button onclick="updateQty('${p.name}', 1)" class="bg-red-50 text-red-600 border border-red-100 px-5 py-1.5 rounded-xl font-bold text-[10px] hover:bg-red-600 hover:text-white transition uppercase">Add</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(name, delta) {
            cart[name] = (cart[name] || 0) + delta;
            if (cart[name] <= 0) delete cart[name];
            
            const safeId = name.replace(/\s+/g, '');
            const ctrl = document.getElementById(`ctrl-${safeId}`);
            
            if (cart[name] > 0) {
                ctrl.innerHTML = `
                    <div class="flex items-center gap-3 bg-slate-50 p-1 rounded-xl border border-slate-100">
                        <button onclick="updateQty('${name}', -1)" class="w-7 h-7 flex items-center justify-center bg-white text-slate-400 rounded-lg shadow-sm font-bold">-</button>
                        <span class="font-bold text-slate-800 text-xs">${cart[name]}</span>
                        <button onclick="updateQty('${name}', 1)" class="w-7 h-7 flex items-center justify-center bg-red-600 text-white rounded-lg shadow-md font-bold">+</button>
                    </div>`;
            } else {
                ctrl.innerHTML = `<button onclick="updateQty('${name}', 1)" class="bg-red-50 text-red-600 border border-red-100 px-5 py-1.5 rounded-xl font-bold text-[10px] hover:bg-red-600 hover:text-white transition uppercase">Add</button>`;
            }
            updateCartBar();
        }

        function updateCartBar() {
            let total = 0, items = 0;
            for(let key in cart) {
                const p = products.find(i => i.name === key);
                total += p.price * cart[key];
                items += cart[key];
            }
            document.getElementById('cartBar').classList.toggle('hidden', items === 0);
            document.getElementById('itemCount').innerText = items + " Items Added";
            document.getElementById('totalPrice').innerText = "₹" + total;
        }

        function toggleModal(show) { document.getElementById('orderModal').classList.toggle('hidden', !show); }

        async function placeOrder() {
            const data = {
                name: document.getElementById('custName').value,
                phone: document.getElementById('custWhatsApp').value,
                house: document.getElementById('custHouse').value,
                city: document.getElementById('custCity').value,
                land: document.getElementById('custLandmark').value
            };

            if(!data.name || !data.phone || !data.house || !data.city || !data.land) return alert("Fill all details!");

            const btn = document.getElementById('submitOrderBtn');
            btn.disabled = true; btn.innerText = "Sending to Kitchen...";

            let summary = [], finalTotal = 0;
            for(let key in cart) {
                summary.push(`${cart[key]}x ${key}`);
                finalTotal += products.find(i => i.name === key).price * cart[key];
            }

            const payload = {
                action: "addOrder",
                name: data.name,
                order: summary.join(", "),
                total: finalTotal,
                address: `H: ${data.house}, ${data.city} (Landmark: ${data.land})`,
                phone: data.phone,
                txn: "VIP" + Date.now().toString().slice(-5)
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("Order Placed Successfully!");
                location.reload();
            } catch (e) { alert("Error placing order"); btn.disabled = false; }
        }

        window.onload = init;
    </script>
</body>
</html>
