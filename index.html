<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Restaurant Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Hide scrollbar for category list */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .category-btn.active { background-color: #dc2626; color: white; border-color: #dc2626; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-56">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        
        <!-- Header -->
        <div class="bg-red-600 p-6 text-white text-center rounded-b-[2.5rem] shadow-md">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">My Restaurant</h1>
            <p class="text-[10px] opacity-90 mt-1 uppercase tracking-widest">Delicious & Fresh Food</p>
        </div>

        <!-- Table Selection -->
        <div class="p-6 pb-2">
            <label class="block text-gray-500 text-[10px] font-black mb-1 uppercase tracking-widest ml-1">Select Table</label>
            <select id="tableNo" class="w-full p-4 border-2 border-red-50 rounded-2xl bg-gray-50 font-bold text-red-600 outline-none shadow-sm appearance-none">
                <option value="1">Table No. 1</option>
                <option value="2">Table No. 2</option>
                <option value="3">Table No. 3</option>
                <option value="4">Table No. 4</option>
                <option value="5">Table No. 5</option>
                <option value="6">Table No. 6</option>
                <option value="7">Table No. 7</option>
                <option value="8">Table No. 8</option>
                <option value="9">Table No. 9</option>
                <option value="10">Table No. 10</option>
            </select>
        </div>

        <!-- Categories Filter -->
        <div class="sticky top-0 z-10 bg-white py-3 shadow-sm border-b border-gray-100">
            <div id="categoryList" class="flex overflow-x-auto px-6 gap-3 no-scrollbar whitespace-nowrap">
                <!-- Categories will be injected here via JS -->
            </div>
        </div>

        <!-- Menu Items -->
        <div id="menuList" class="px-6 space-y-4 pb-4 mt-2">
            <p class="text-center py-10 text-gray-400 animate-pulse uppercase text-xs font-bold">Loading Menu...</p>
        </div>

        <!-- Fixed Bottom Bar -->
        <div class="fixed bottom-0 max-w-md w-full bg-white p-6 border-t shadow-[0_-15px_35px_rgba(0,0,0,0.1)] rounded-t-[2.5rem]">
            
            <!-- Surcharge Options -->
            <div class="mb-4 space-y-2">
                <p class="text-gray-400 text-[9px] font-black uppercase tracking-widest ml-1">Add Surcharges</p>
                <div class="flex gap-2 overflow-x-auto pb-1 no-scrollbar">
                    <label class="flex items-center gap-2 bg-gray-100 px-3 py-2 rounded-xl text-xs font-bold text-gray-600 cursor-pointer select-none border border-transparent">
                        <input type="checkbox" id="chkParcel" class="w-4 h-4 accent-red-600" onchange="calculateTotal()"> 
                        Parcel (+₹10)
                    </label>
                    <label class="flex items-center gap-2 bg-gray-100 px-3 py-2 rounded-xl text-xs font-bold text-gray-600 cursor-pointer select-none border border-transparent">
                        <input type="checkbox" id="chkGST" class="w-4 h-4 accent-red-600" onchange="calculateTotal()"> 
                        GST (5%)
                    </label>
                </div>
                <!-- Manual Extra Charge Input -->
                <div class="flex items-center gap-2">
                     <input type="number" id="extraChargeInput" placeholder="Other Charge (₹)" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-2 text-xs font-bold text-gray-700 outline-none" oninput="calculateTotal()">
                </div>
            </div>

            <!-- Total & Cart Count -->
            <div class="flex justify-between items-end mb-4 px-2 border-t border-gray-100 pt-3">
                <div>
                    <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest leading-none mb-1">Total Bill</p>
                    <p class="text-3xl font-black text-gray-900 leading-none">₹<span id="totalDisplay">0</span></p>
                </div>
                <div id="cartStatus">
                    <span id="itemCount" class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-[10px] font-black uppercase">0 Items</span>
                </div>
            </div>

            <!-- Confirm Button -->
            <button onclick="placeOrder()" id="orderBtn" class="w-full bg-red-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">Confirm Order</button>
        </div>
    </div>
