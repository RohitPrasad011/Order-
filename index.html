<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Restaurant - Online Ordering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .food-card { border-radius: 15px; overflow: hidden; transition: 0.3s; }
        .cart-btn { background: #e23744; color: white; border-radius: 8px; } /* Zomato Red */
        body { background-color: #f4f4f4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>

    <div class="bg-white p-4 shadow-md sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-red-600">VIP Restaurant</h1>
        <p class="text-gray-500 text-sm">Delicious food delivered fast</p>
    </div>

    <div class="p-4 space-y-4">
        <div class="food-card bg-white p-3 flex shadow-sm border border-gray-100">
            <img src="https://images.unsplash.com/photo-1567188040759-fb8a883dc6d8?w=200" class="w-24 h-24 object-cover rounded-lg">
            <div class="ml-4 flex-1">
                <h3 class="font-bold text-lg text-gray-800">Paneer Butter Masala</h3>
                <p class="text-gray-500 text-xs">Rich creamy curry with paneer cubes</p>
                <div class="mt-2 flex justify-between items-center">
                    <span class="font-bold text-red-600">₹250</span>
                    <button onclick="addToCart('Paneer Butter Masala', 250)" class="cart-btn px-4 py-1 text-sm font-semibold">ADD</button>
                </div>
            </div>
        </div>

        <div class="food-card bg-white p-3 flex shadow-sm border border-gray-100">
            <img src="https://images.unsplash.com/photo-1589302168068-964664d93dc0?w=200" class="w-24 h-24 object-cover rounded-lg">
            <div class="ml-4 flex-1">
                <h3 class="font-bold text-lg text-gray-800">Chicken Biryani</h3>
                <p class="text-gray-500 text-xs">Aromatic basmati rice with spices</p>
                <div class="mt-2 flex justify-between items-center">
                    <span class="font-bold text-red-600">₹320</span>
                    <button onclick="addToCart('Chicken Biryani', 320)" class="cart-btn px-4 py-1 text-sm font-semibold">ADD</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartBar" class="hidden fixed bottom-5 left-5 right-5 bg-green-600 text-white p-4 rounded-xl shadow-2xl flex justify-between items-center">
        <div>
            <span id="cartCount">0 Items</span> | <span id="cartTotal">₹0</span>
        </div>
        <button onclick="goToCheckout()" class="font-bold uppercase">View Cart <i class="fa fa-arrow-right"></i></button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            document.getElementById('cartBar').classList.remove('hidden');
            document.getElementById('cartCount').innerText = cart.length + " Items";
            document.getElementById('cartTotal').innerText = "₹" + total;
        }

        function goToCheckout() {
            // अगले स्टेप में हम यहाँ पेमेंट और आर्डर फॉर्म जोड़ेंगे
            alert("Order Summary: " + cart.length + " items. Total: ₹" + total);
        }
    </script>
</body>
</html>
