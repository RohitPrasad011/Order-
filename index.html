<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Restaurant - Order Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .menu-card { transition: transform 0.2s; }
        .menu-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative">
        <div class="bg-gradient-to-r from-red-600 to-red-700 p-8 text-white text-center rounded-b-[3rem] shadow-xl">
            <h1 class="text-4xl font-black tracking-tighter italic">MY RESTAURANT</h1>
            <p class="text-sm font-medium opacity-90 mt-1">Deliciousness Delivered to Your Table</p>
        </div>

        <div class="p-6">
            <label class="block text-gray-800 font-extrabold text-sm mb-2 uppercase tracking-wider text-center">Select Your Table Number</label>
            <select id="tableNo" class="w-full p-4 border-2 border-red-100 rounded-2xl bg-red-50 font-black text-center text-xl text-red-600 appearance-none focus:border-red-500 transition-all outline-none shadow-sm">
                <option value="1">Table 01</option>
                <option value="2">Table 02</option>
                <option value="3">Table 03</option>
                <option value="4">Table 04</option>
                <option value="5">Table 05</option>
            </select>
        </div>

        <div class="px-6 pb-44">
            <h2 class="text-xl font-black text-gray-800 mb-4 border-l-4 border-red-600 pl-3">TODAY'S MENU</h2>
            <div id="menuList" class="space-y-4">
                <p class="text-center py-10 text-gray-400 animate-pulse">Loading items...</p>
            </div>
        </div>

        <div class="fixed bottom-0 max-w-md w-full bg-white/90 backdrop-blur-md p-6 border-t border-gray-100 shadow-[0_-10px_25px_rgba(0,0,0,0.05)] rounded-t-[2.5rem]">
            <div class="flex justify-between items-end mb-5 px-2">
                <div>
                    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Total Amount</p>
                    <p class="text-3xl font-black text-gray-900">₹<span id="totalDisplay">0</span></p>
                </div>
                <div class="text-right">
                    <span id="itemCount" class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-black">0 ITEMS</span>
                </div>
            </div>
            <button onclick="placeOrder()" id="orderBtn" class="w-full bg-red-600 hover:bg-red-700 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-red-200 active:scale-95 transition-all duration-200 uppercase tracking-widest">Confirm Order</button>
        </div>
    </div>

    <script>
        // आपकी नई वाली मेनू शीट का लिंक
        const MENU_SHEET = "https://docs.google.com/spreadsheets/d/1y4tXP_8SZ_iUHYcl7vA6gq72zILeEoVHCuSOXyi2ubo/gviz/tq?tqx=out:csv&sheet=Menu";
        // आपका पुराना फॉर्म लिंक
        const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSe4DDIqsgSI84WB_ShzfMA7zhWJMKswxY8tAT1e0OF3_4bwxw/formResponse";
        
        let cart = [];
        let total = 0;

        async function loadMenu() {
            try {
                const response = await fetch(MENU_SHEET);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('menuList');
                container.innerHTML = "";

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const name = cols[0].replace(/"/g, '').trim();
                    const price = parseInt(cols[1].replace(/"/g, '').trim());
                    
                    if(name && !isNaN(price)) {
                        container.innerHTML += `
                            <div class="menu-card flex items-center justify-between bg-white p-5 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <div>
                                    <h3 class="font-bold text-gray-800 text-lg">${name}</h3>
                                    <p class="text-red-600 font-black text-xl">₹${price}</p>
                                </div>
                                <button onclick="addToCart('${name}', ${price})" class="bg-gray-900 text-white h-12 w-12 rounded-2xl flex items-center justify-center font-bold text-2xl shadow-lg active:bg-red-600 transition-colors">+</button>
                            </div>
                        `;
                    }
                });
            } catch (e) {
                document.getElementById('menuList').innerHTML = "Error loading menu. Please check Sheet tab name.";
            }
        }

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            document.getElementById('totalDisplay').innerText = total;
            document.getElementById('itemCount').innerText = `${cart.length} ITEMS`;
        }

        function placeOrder() {
            if(cart.length === 0) return alert("Please select some items first!");
            const table = document.getElementById('tableNo').value;
            const items = cart.join(", ");
            const btn = document.getElementById('orderBtn');
            
            btn.disabled = true;
            btn.innerText = "SENDING...";

            const formData = new FormData();
            formData.append('entry.1750325692', table);
            formData.append('entry.732456507', items);
            formData.append('entry.424181828', total);

            fetch(FORM_ACTION, { method: 'POST', mode: 'no-cors', body: formData })
            .then(() => {
                alert("Order Placed Successfully! ✅");
                cart = []; total = 0;
                location.reload();
            });
        }
        loadMenu();
    </script>
</body>
</html>
