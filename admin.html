<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP RESTO | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50 p-4">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-slate-800 tracking-tight">VIP <span class="text-red-600">ADMIN</span></h1>
            <button onclick="loadOrders()" class="bg-slate-100 p-2 rounded-lg text-slate-600 hover:bg-blue-50 hover:text-blue-600 transition">
                <i class="fa fa-sync-alt"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 mt-6">
        <div id="orderContainer" class="space-y-4">
            <div class="text-center py-20 text-slate-400">
                <i class="fa fa-spinner fa-spin text-2xl mb-2"></i>
                <p class="text-xs font-bold uppercase tracking-widest">Checking New Orders...</p>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxprlgeOXvjPYQvKzF9TVuBeohuKk8bVBC8rThIg6-txgTLGPWRCn50d-wKyCtbU4Uf/exec";

        async function loadOrders() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getOrders");
                const orders = await res.json();
                render(orders);
            } catch (e) {
                document.getElementById('orderContainer').innerHTML = `
                    <div class="bg-red-50 p-6 rounded-2xl text-center border border-red-100 text-red-600 text-sm font-bold">
                        Sync Error! Check Apps Script Deployment Access.
                    </div>`;
            }
        }

        function render(orders) {
            const box = document.getElementById('orderContainer');
            if(!orders || orders.length === 0) {
                box.innerHTML = `<p class="text-center py-20 text-slate-400 text-xs font-bold uppercase">No orders found</p>`;
                return;
            }

            box.innerHTML = orders.reverse().map(o => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <span class="text-[9px] font-black bg-slate-100 px-2 py-0.5 rounded uppercase text-slate-500">${o.txn}</span>
                            <h3 class="text-lg font-black text-slate-800 mt-1">${o.name}</h3>
                            <p class="text-xs font-bold text-blue-600">${o.phone}</p>
                        </div>
                        <span class="px-2 py-1 rounded text-[9px] font-black uppercase ${o.status === 'Pending' ? 'bg-orange-100 text-orange-600' : (o.status === 'Rejected' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600')}">
                            ${o.status}
                        </span>
                    </div>

                    <div class="bg-slate-50 p-3 rounded-xl mb-4 border border-dashed border-slate-200">
                        <p class="text-xs font-bold text-slate-700">${o.items}</p>
                    </div>

                    <p class="text-[10px] text-slate-400 mb-4 uppercase tracking-tighter italic">📍 ${o.address}</p>

                    <div class="flex items-center justify-between pt-4 border-t border-slate-50 gap-3">
                        <p class="text-sm font-black text-slate-900">₹${o.total}</p>
                        
                        ${o.status === 'Pending' ? `
                            <div class="flex gap-2">
                                <button onclick="updateStatus('${o.txn}', 'Rejected', '${o.phone}', '${o.name}')" class="px-4 py-2 text-[10px] font-bold text-red-600 uppercase">Reject</button>
                                <button onclick="updateStatus('${o.txn}', 'Confirmed', '${o.phone}', '${o.name}')" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg">Confirm</button>
                            </div>
                        ` : `
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${o.status === 'Confirmed' ? '✅ Processed' : '❌ Cancelled'}</p>
                        `}
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(txn, status, phone, name) {
            let dName = "", dPhone = "";
            if(status === 'Confirmed') {
                dName = prompt("Delivery Boy Name:");
                dPhone = prompt("Delivery Boy Phone:");
                if(!dName || !dPhone) return;
            }

            // Show simple loader
            event.target.innerText = "Wait...";

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "updateStatus", txn, status, dName, dPhone })
            });

            if(status === 'Confirmed') {
                const msg = `*VIP RESTO*%0A%0AHi *${name}*, your order *#${txn}* is Confirmed!%0A%0A🛵 *Agent:* ${dName}%0A📞 *Phone:* ${dPhone}%0A%0A_Coming fast!_`;
                window.open(`https://wa.me/91${phone}?text=${msg}`, '_blank');
            }
            
            setTimeout(loadOrders, 2000);
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
