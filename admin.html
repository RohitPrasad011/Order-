<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Admin Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; }
.history-card { background:#0f172a; border:1px solid #374151; }
button { font-weight:700; font-size:12px; height:40px; border-radius:8px; padding:0 12px; }
.btn-kot { background:#ea580c; color:white; }
.btn-print { background:#3b82f6; color:white; }
.btn-save { background:#eab308; color:black; }
.badge { background:#ef4444; padding:2px 8px; border-radius:20px; font-size:12px; }
</style>
</head>

<body class="p-4 pb-32">

<header class="sticky top-0 bg-black/80 backdrop-blur py-3 mb-6 border-b border-gray-800">
<div class="flex justify-between items-center mb-3">
<h1 class="text-xl font-black">POS TERMINAL <span id="orderCount" class="badge">0</span></h1>
<div class="flex gap-2">
<button onclick="toggleSelectMode()" id="mergeBtn" class="bg-blue-600 text-white">MERGE</button>
<button onclick="loadOrders()" class="bg-gray-700 text-white">REFRESH</button>
</div>
</div>
<input type="text" id="searchInput" onkeyup="filterOrders()" placeholder="Search Table..." class="w-full bg-gray-900 border border-gray-700 rounded-lg h-10 px-3">
</header>

<!-- Incoming -->
<h2 class="text-xs text-orange-400 font-bold mb-3">1. Incoming Orders</h2>
<div id="orderList" class="grid md:grid-cols-2 gap-4 mb-8"></div>

<hr class="border-gray-800 my-6">

<!-- History -->
<h2 class="text-xs text-gray-400 font-bold mb-3">2. Order History</h2>
<div id="historyList" class="flex flex-col gap-4 mb-8"></div>

<hr class="border-gray-800 my-6">

<!-- Merged -->
<h2 class="text-xs text-blue-400 font-bold mb-3">3. Merged Table Bills</h2>
<div id="mergedList" class="flex flex-col gap-4"></div>

<div id="printSection" style="display:none; font-family:monospace;"></div>

<script>

const SHEET_URL = "PASTE_YOUR_SHEET_CSV_LINK_HERE";

let history = JSON.parse(localStorage.getItem('pos_history_v12')) || [];
let mergedBills = JSON.parse(localStorage.getItem('pos_merged_v12')) || {};
let selectedItems = [];
let isSelecting = false;

async function loadOrders() {
    try {
        const res = await fetch(SHEET_URL + "&t=" + Date.now());
        const text = await res.text();

        const rows = text.split('\n').map(r =>
            r.split(',').map(c => c.replace(/"/g,'').trim())
        );

        const headers = rows[0];

        const tIdx = headers.findIndex(h => h.toUpperCase().includes("TABLE"));
        const iIdx = headers.findIndex(h => h.toUpperCase().includes("ITEM"));
        const pIdx = headers.findIndex(h => 
            h.toUpperCase().includes("TOTAL") || 
            h.toUpperCase().includes("AMOUNT")
        );

        const incomingDiv = document.getElementById("orderList");
        const historyDiv = document.getElementById("historyList");

        incomingDiv.innerHTML = "";
        historyDiv.innerHTML = "";

        let liveCount = 0;

        for(let i = rows.length - 1; i >= 1; i--) {

            const table = rows[i][tIdx];
            const items = rows[i][iIdx] || "";
            const amount = parseFloat(rows[i][pIdx]) || 0;

            if(!table) continue;

            const id = (table + items + amount).replace(/\s/g,'');

            const inHistory = history.find(h => h.id === id);

            const card = `
            <div class="card ${inHistory ? 'history-card' : ''}">
                <div class="flex justify-between">
                    <span class="font-bold text-lg">${table}</span>
                    <span class="text-green-400 font-bold text-xl">₹${amount}</span>
                </div>
                <pre class="text-sm mt-2">${items}</pre>
                <div class="flex gap-2 mt-3 flex-wrap">
                    <button class="btn-kot" onclick="printDoc('KOT','${table}','${encodeURIComponent(items)}')">KOT</button>
                    <button class="btn-print" onclick="printDoc('BILL','${table}','${encodeURIComponent(items)}',${amount})">PRINT</button>
                    <button class="btn-save" onclick="saveHistory('${id}','${table}','${encodeURIComponent(items)}',${amount})">SAVE</button>
                    ${isSelecting ? `<button class="bg-purple-600 text-white" onclick="selectForMerge('${id}','${table}','${encodeURIComponent(items)}',${amount})">SELECT</button>` : ''}
                </div>
            </div>`;

            if(inHistory) {
                historyDiv.innerHTML += card;
            } else {
                incomingDiv.innerHTML += card;
                liveCount++;
            }
        }

        document.getElementById("orderCount").innerText = liveCount;

        renderMerged();

    } catch(err) {
        console.log(err);
    }
}

function saveHistory(id, table, items, amount) {

    if(history.find(h => h.id === id)) return;

    history.push({
        id,
        table,
        items: decodeURIComponent(items),
        amount,
        time: Date.now()
    });

    localStorage.setItem('pos_history_v12', JSON.stringify(history));

    loadOrders();
}

function toggleSelectMode() {
    isSelecting = !isSelecting;
    selectedItems = [];
    document.getElementById("mergeBtn").innerText = isSelecting ? "CANCEL" : "MERGE";
    loadOrders();
}

function selectForMerge(id, table, items, amount) {

    const idx = selectedItems.findIndex(s => s.id === id);

    if(idx > -1) {
        selectedItems.splice(idx,1);
    } else {
        selectedItems.push({
            id,
            table,
            items: decodeURIComponent(items),
            amount
        });
    }

    if(selectedItems.length >= 2) {
        const target = prompt("Merge Into Table Name:", selectedItems[0].table);
        if(!target) return;

        if(!mergedBills[target])
            mergedBills[target] = { items: [], total:0 };

        selectedItems.forEach(o => {
            mergedBills[target].items.push(o.items);
            mergedBills[target].total += o.amount;
        });

        localStorage.setItem('pos_merged_v12', JSON.stringify(mergedBills));

        isSelecting = false;
        selectedItems = [];
        document.getElementById("mergeBtn").innerText = "MERGE";
        loadOrders();
    }
}

function renderMerged() {
    const div = document.getElementById("mergedList");
    div.innerHTML = "";

    for(let t in mergedBills) {
        const bill = mergedBills[t];

        div.innerHTML += `
        <div class="card border border-blue-600">
            <div class="flex justify-between">
                <span class="font-bold text-lg">${t}</span>
                <span class="text-green-400 font-bold text-xl">₹${bill.total}</span>
            </div>
            <pre class="mt-2">${bill.items.join('\n---\n')}</pre>
            <div class="flex gap-2 mt-3">
                <button class="btn-print" onclick="printDoc('FINAL BILL','${t}','${encodeURIComponent(bill.items.join('\n'))}',${bill.total})">PRINT FINAL</button>
                <button class="bg-red-600 text-white" onclick="clearTable('${t}')">SETTLE</button>
            </div>
        </div>`;
    }
}

function clearTable(t) {
    if(confirm("Clear "+t+" ?")) {
        delete mergedBills[t];
        localStorage.setItem('pos_merged_v12', JSON.stringify(mergedBills));
        loadOrders();
    }
}

function printDoc(type, table, items, total=0) {
    const area = document.getElementById("printSection");
    area.style.display="block";
    area.innerHTML = `
    <div style="width:280px">
    <h2>${type}</h2>
    <h3>${table}</h3>
    <hr>
    <pre>${decodeURIComponent(items)}</pre>
    ${total ? "<hr><h3>Total: ₹"+total+"</h3>" : ""}
    </div>`;
    window.print();
    area.style.display="none";
}

function filterOrders() {
    const val = document.getElementById("searchInput").value.toUpperCase();
    document.querySelectorAll(".card").forEach(c=>{
        c.style.display = c.innerText.toUpperCase().includes(val) ? "" : "none";
    });
}

loadOrders();
setInterval(loadOrders,15000);

</script>
</body>
</html>
