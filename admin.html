<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Admin - Bill Print</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background: #05070a; color: #e2e8f0; font-family: sans-serif; }
.card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 15px; margin-bottom: 15px; }
pre { background: #000; padding: 10px; border-radius: 8px; font-size: 14px; color: #9ca3af; white-space: pre-wrap; margin-top: 10px; border: 1px solid #1f2937; }
button { font-weight: 800; text-transform: uppercase; font-size: 11px; height: 46px; border-radius: 10px; }
.btn-kot { background: #ea580c; color: white; flex: 1; }
.btn-print { background: #3b82f6; color: white; flex: 1; }
.btn-settle { background: #dc2626; color: white; width: 100%; margin-top: 10px; }

@media print {
body * { visibility: hidden; }
#printSection, #printSection * { visibility: visible; }
#printSection { position: absolute; left: 0; top: 0; width: 100%; color: black; background: white; }
}
</style>
</head>

<body class="p-4 pb-32">

<header class="flex justify-between items-center mb-6 sticky top-0 bg-[#05070a] z-50 py-3 border-b border-slate-900">
<h1 class="text-xl font-black italic text-white uppercase">POS TERMINAL</h1>
<button onclick="loadOrders()" class="bg-slate-800 text-white px-6 h-10 rounded-full border border-slate-700 uppercase">Refresh</button>
</header>

<h2 class="text-[10px] font-bold text-orange-500 uppercase tracking-[3px] mb-4">NEW ORDERS</h2>
<div id="orderList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

<div id="printSection" style="display:none; font-family:monospace; width:280px; padding:10px;"></div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

let historyData = JSON.parse(localStorage.getItem('pos_final_history')) || [];

/* ===== PROPER CSV PARSER ===== */
function parseCSV(text){
 let rows=[], row=[], cell="", inside=false;
 for(let i=0;i<text.length;i++){
   let char=text[i], next=text[i+1];

   if(char=='"' && inside && next=='"'){ cell+='"'; i++; }
   else if(char=='"'){ inside=!inside; }
   else if(char==',' && !inside){ row.push(cell); cell=""; }
   else if((char=='\n'||char=='\r') && !inside){
     if(cell||row.length){ row.push(cell); rows.push(row); row=[]; cell=""; }
   }
   else{ cell+=char; }
 }
 return rows;
}

/* ===== LOAD ORDERS ===== */
async function loadOrders() {
 try {
   const response = await fetch(SHEET_URL + "&cache=" + Date.now());
   const data = await response.text();
   const rows = parseCSV(data);

   const header = rows[0];
   const timeIdx = header.findIndex(h => h.toLowerCase().includes("timestamp"));
   const tableIdx = header.findIndex(h => h.toLowerCase().includes("table"));
   const itemIdx = header.findIndex(h => h.toLowerCase().includes("item"));
   const priceIdx = header.findIndex(h => h.toLowerCase().includes("total") || h.toLowerCase().includes("amount"));

   const container = document.getElementById("orderList");
   container.innerHTML = "";

   for (let i = rows.length - 1; i >= 1; i--) {
     let col = rows[i];
     if (!col[tableIdx]) continue;

     let uniqueID = (col[timeIdx] + col[tableIdx]).replace(/\s+/g,'');
     if (!historyData.includes(uniqueID)) {

       let amount = parseFloat(col[priceIdx]) || 0;

       container.innerHTML += `
       <div class="card shadow-xl">
         <div class="flex justify-between items-center">
           <span class="text-white font-black text-xl italic">${col[tableIdx]}</span>
           <span class="text-green-400 font-black text-2xl">₹${amount}</span>
         </div>
         <pre>${col[itemIdx]}</pre>
         <div class="flex gap-2 mt-4">
           <button class="btn-kot" onclick="printReceipt('KOT', '${col[tableIdx]}', '${encodeURIComponent(col[itemIdx])}')">KOT</button>
           <button class="btn-print" onclick="printReceipt('BILL', '${col[tableIdx]}', '${encodeURIComponent(col[itemIdx])}', ${amount})">BILL</button>
         </div>
         <button class="btn-settle" onclick="markSettle('${uniqueID}')">SETTLE</button>
       </div>`;
     }
   }

 } catch (err) { console.log("Load Error", err); }
}

/* ===== PRINT ===== */
function printReceipt(type, table, items, total = 0) {
 const area = document.getElementById("printSection");
 area.style.display = "block";

 area.innerHTML = `
 <div style="text-align:center;">
   <h2>${type}</h2>
   <h1 style="font-size:30px;">${table}</h1>
   <p>${new Date().toLocaleString()}</p>
   <hr style="border-top: 2px dashed black;">
 </div>
 <pre style="font-size:16px;">${decodeURIComponent(items)}</pre>
 ${total ? `<hr style="border-top: 2px dashed black;">
 <h2 style="display:flex; justify-content:space-between;">
 <span>TOTAL:</span><span>₹${total}</span></h2>` : ""}
 <div style="text-align:center;margin-top:15px;">धन्यवाद!</div>
 `;

 window.print();
 area.style.display = "none";
}

/* ===== SETTLE ===== */
function markSettle(id) {
 if (confirm("Table clear karna hai?")) {
   historyData.push(id);
   localStorage.setItem('pos_final_history', JSON.stringify(historyData));
   loadOrders();
 }
}

/* ===== AUTO LOAD ===== */
loadOrders();
setInterval(loadOrders, 15000);

</script>
</body>
</html>
