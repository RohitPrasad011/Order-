<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin | Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50 border-b">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic">VIP <span class="text-red-600">ADMIN</span></h1>
            <button onclick="loadOrders()" class="bg-slate-100 p-2 rounded-lg text-slate-600 active:rotate-180 transition-all">
                <i class="fa fa-sync-alt"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto p-4" id="orderBox">
        <div class="text-center py-20 text-slate-400">
            <i class="fa fa-spinner fa-spin text-3xl mb-3"></i>
            <p class="text-xs font-bold uppercase tracking-widest">Fetching Orders...</p>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-pNz_6HP34j97QQzUBPJrkwqB2zucq3M6y927LTNazuAapf9yE_IKat4oTfa6ApsB/exec";

        async function loadOrders() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getOrders", { redirect: 'follow' });
                const orders = await res.json();
                render(orders);
            } catch (e) {
                document.getElementById('orderBox').innerHTML = `<div class="bg-red-50 p-10 rounded-3xl text-red-600 text-center font-bold">Sync Error! Check 'Anyone' Access.</div>`;
            }
        }

        function render(orders) {
            const box = document.getElementById('orderBox');
            if(!orders || orders.length === 0) { box.innerHTML = "<p class='text-center py-10'>No orders yet.</p>"; return; }
            
            box.innerHTML = orders.reverse().map(o => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border mb-4">
                    <div class="flex justify-between mb-3">
                        <span class="text-[9px] font-black bg-gray-100 px-2 py-0.5 rounded text-gray-500 uppercase">${o.txn}</span>
                        <span class="text-[10px] font-black px-2 py-1 rounded uppercase ${o.status=='Pending'?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600'}">${o.status}</span>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg">${o.name} <span class="text-blue-600 text-sm font-normal ml-2">${o.phone}</span></h3>
                    <p class="text-sm text-slate-600 my-2 font-medium">${o.items}</p>
                    <p class="text-[11px] text-slate-400 border-t pt-2 mt-2 italic">📍 ${o.address}</p>
                    <div class="flex gap-3 mt-5">
                        <button onclick="update('${o.txn}','Rejected','${o.phone}','${o.name}')" class="flex-1 py-3 text-xs font-bold text-red-500 uppercase">Reject</button>
                        <button onclick="update('${o.txn}','Confirmed','${o.phone}','${o.name}')" class="flex-1 bg-slate-900 text-white py-3 rounded-xl text-xs font-bold uppercase shadow-lg">Confirm & Notify</button>
                    </div>
                </div>
            `).join('');
        }

        async function update(txn, status, phone, name) {
            let dName = "", dPhone = "";
            if(status === 'Confirmed') {
                dName = prompt("Delivery Agent Name:");
                dPhone = prompt("Agent Phone:");
                if(!dName || !dPhone) return;
            }
            
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "updateStatus", txn, status, dName, dPhone })
            });

            if(status === 'Confirmed') {
                const msg = `*VIP RESTO*%0AHi *${name}*, your order #${txn} is confirmed!%0A🛵 Agent: ${dName} (${dPhone})`;
                window.open(`https://wa.me/91${phone}?text=${msg}`, '_blank');
            }
            setTimeout(loadOrders, 1000);
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
