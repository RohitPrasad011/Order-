<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Manual Table Linking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .section-header { border-left: 4px solid #ef4444; padding-left: 12px; margin-bottom: 20px; font-weight: 900; text-transform: uppercase; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-7xl mx-auto no-print">
        <header class="flex justify-between items-center mb-10 border-b border-slate-900 pb-6">
            <h1 class="text-3xl font-black italic text-red-600">POS ADMIN <span class="text-slate-500 text-xs not-italic uppercase ml-2 tracking-widest">Manual Merge Mode</span></h1>
            <button onclick="fetchOrders()" class="bg-red-600 hover:bg-red-500 p-4 rounded-2xl shadow-lg active:scale-95 transition-all">
                <i class="fas fa-sync-alt"></i> REFRESH DATA
            </button>
        </header>

        <h2 class="section-header text-red-500 text-sm">1. New Incoming Orders (Review & Link)</h2>
        <div id="incomingOrders" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-16">
            </div>

        <h2 class="section-header text-blue-500 text-sm">2. Final Billing Desk (Merged Tables)</h2>
        <div id="billingDesk" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";
        const SESSION_START = new Date();

        // Data Management
        let linkedBills = JSON.parse(localStorage.getItem('pos_manual_link_data')) || {};
        let linkedIds = JSON.parse(localStorage.getItem('pos_linked_ids')) || [];

        async function fetchOrders() {
            try {
                const response = await fetch(`${SHEET_URL}&cb=${Date.now()}`);
                const csvData = await response.text();
                const lines = csvData.split('\n').filter(l => l.trim() !== "");
                
                const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
                const tIdx = headers.indexOf("Timestamp");
                const bIdx = headers.indexOf("TABLE NO.");
                const iIdx = headers.indexOf("ITEMS");
                const mIdx = headers.indexOf("TOTAL MOUNT");

                const incomingContainer = document.getElementById('incomingOrders');
                incomingContainer.innerHTML = "";

                const rows = lines.slice(1).reverse();
                rows.forEach(row => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/"/g, ''));
                    const id = (cols[tIdx] + cols[bIdx]).replace(/\s+/g, '');
                    
                    // Filter: Only new session orders and not yet linked
                    if (new Date(cols[tIdx]) > SESSION_START && !linkedIds.includes(id)) {
                        renderIncomingCard(cols[bIdx], cols[iIdx], cols[mIdx], id);
                    }
                });
                renderBillingDesk();
            } catch (e) { console.error("Sync Error"); }
        }

        function renderIncomingCard(table, items, price, id) {
            const container = document.getElementById('incomingOrders');
            const formattedItems = items.replace(/\|/g, '<br>').replace(/\\n/g, '<br>');
            container.innerHTML += `
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl shadow-xl border-l-4 border-l-red-600">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-black text-xl text-white italic">${table}</h3>
                        <span class="text-[10px] font-mono text-green-400">₹${price}</span>
                    </div>
                    <div class="text-[11px] text-slate-400 mb-5 h-20 overflow-y-auto italic border-t border-white/5 pt-2">${formattedItems}</div>
                    <button onclick="linkToBill('${table}', '${encodeURIComponent(formattedItems)}', ${price}, '${id}')" 
                            class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">
                        Link to Table <i class="fas fa-plus-circle ml-1"></i>
                    </button>
                </div>
            `;
        }

        function linkToBill(table, encodedItems, price, id) {
            const items = decodeURIComponent(encodedItems);
            if (!linkedBills[table]) {
                linkedBills[table] = { items: [], total: 0 };
            }
            linkedBills[table].items.push(items);
            linkedBills[table].total += parseFloat(price);
            
            linkedIds.push(id);
            saveData();
            fetchOrders();
        }

        function renderBillingDesk() {
            const desk = document.getElementById('billingDesk');
            desk.innerHTML = "";
            
            Object.keys(linkedBills).forEach(table => {
                const data = linkedBills[table];
                desk.innerHTML += `
                    <div class="bg-slate-900 border border-slate-700 p-6 rounded-[2.5rem] shadow-2xl border-t-4 border-t-blue-500">
                        <div class="flex justify-between items-center mb-4">
                            <h2 class="text-3xl font-black text-white italic">${table}</h2>
                            <span class="text-xs bg-blue-900/30 text-blue-400 px-3 py-1 rounded-full font-bold uppercase tracking-tighter">Merged Bill</span>
                        </div>
                        <div class="bg-black/50 rounded-2xl p-5 mb-5 text-sm text-slate-300 space-y-3 max-h-48 overflow-y-auto border border-slate-800">
                            ${data.items.map(i => `<div class="border-b border-white/5 pb-2 last:border-0">${i}</div>`).join('')}
                        </div>
                        <div class="flex justify-between items-center mb-6 px-2">
                            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Final Total</span>
                            <span class="text-2xl font-black text-green-400 font-mono italic">₹${data.total}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="printFinalBill('${table}')" class="bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">Print Final Bill</button>
                            <button onclick="settleTable('${table}')" class="bg-green-600 hover:bg-green-500 text-white py-4 rounded-xl font-black text-[10px] uppercase shadow-lg active:scale-95 transition-all">Settle & Clear</button>
                        </div>
                    </div>
                `;
            });
        }

        function printFinalBill(table) {
            const data = linkedBills[table];
            const printWin = window.open('', '_blank', 'width=400,height=600');
            printWin.document.write(`
                <html><body style="font-family:monospace;padding:30px; line-height:1.4;">
                <center><h2 style="margin:0;">FINAL INVOICE</h2><h1 style="margin:10px 0;">${table}</h1><hr></center>
                <div style="font-size:14px;margin:25px 0;">${data.items.join('<br>')}</div>
                <hr><h2 style="display:flex;justify-content:space-between; margin:20px 0;"><span>TOTAL:</span> <span>₹${data.total}</span></h2><hr>
                <center><p style="font-size:12px;margin-top:30px;">THANK YOU FOR VISITING!</p></center>
                <script>window.onload=function(){window.print();window.close();}<\/script></body></html>
            `);
            printWin.document.close();
        }

        function settleTable(table) {
            if (confirm("Confirm Settle? All items for " + table + " will be archived.")) {
                delete linkedBills[table];
                saveData();
                fetchOrders();
            }
        }

        function saveData() {
            localStorage.setItem('pos_manual_link_data', JSON.stringify(linkedBills));
            localStorage.setItem('pos_linked_ids', JSON.stringify(linkedIds));
        }

        fetchOrders();
    </script>
</body>
</html>
