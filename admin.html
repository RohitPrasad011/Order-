<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Royal Food POS - Universal Print</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* --- App UI (No changes here) --- */
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; -webkit-tap-highlight-color:transparent; }
.card { background:#111827; border:1px solid #1f2937; border-radius:15px; padding:15px; margin-bottom:15px; }
pre { background:#000; padding:10px; border-radius:10px; white-space:pre-wrap; font-family:monospace; font-size:14px; color:#cbd5e1; border:1px solid #1f2937; }

/* 🔴🔥 UNIVERSAL PRINT ENGINE - FITS ANY PAPER SIZE 🔥🔴 */
@media print {
    @page { 
        margin: 5mm !important; /* हल्का सा मार्जिन ताकि टेक्स्ट कटे नहीं */
        size: auto; 
    }
    html, body { 
        background: #fff !important; 
        color: #000 !important; 
        width: 100% !important; /* पन्ने की पूरी चौड़ाई */
        margin: 0 !important; 
        padding: 0 !important; 
    }
    body * { visibility: hidden !important; display: none !important; }
    
    #printSection, #printSection * { 
        visibility: visible !important; 
        display: block !important; 
        background: white !important; 
        color: black !important;
    }
    
    #printSection { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 100% !important; /* 🔥 यह किसी भी पेपर पर फुल फिट कर देगा */
        padding: 0 !important; 
        margin: 0 !important;
        box-sizing: border-box;
    }

    /* बिल के अंदर का कंटेंट भी 100% चौड़ा रहेगा */
    .bill-container {
        width: 100% !important;
        max-width: none !important;
        padding: 10px;
    }
}

#printSection { display: none; }
.hidden { display: none; }
</style>
</head>

<body class="p-4 pb-32">
<header class="flex justify-between items-center mb-6 sticky top-0 bg-[#05070a] py-2 z-50">
  <h1 class="text-xl font-black text-white italic">ROYAL FOOD <span class="text-orange-500">POS</span></h1>
  <button onclick="loadOrders()" class="bg-gray-800 px-3 rounded text-orange-400 text-[10px] border border-gray-700 uppercase">Refresh</button>
</header>

<div id="orderList"></div>
<div id="printSection"></div>

<script>
const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

async function loadOrders(){
    const res=await fetch(SHEET_URL+"&t="+Date.now());
    const data=await res.text();
    allOrders = parseCSV(data).filter(r=>r[1]&&r[1].toLowerCase()!=="table").slice(-50);
    render();
}

function parseCSV(text){
    const rows=[]; let row=[],cell="",inside=false;
    for(let i=0;i<text.length;i++){
        let c=text[i];
        if(c=='"'){inside=!inside}
        else if(c==","&&!inside){row.push(cell);cell=""}
        else if((c=="\n"||c=="\r")&&!inside){
            if(cell||row.length){row.push(cell);rows.push(row);row=[];cell=""}
        }else{cell+=c}
    }
    if(cell||row.length){row.push(cell);rows.push(row)}
    return rows;
}

function render(){
    const orderDiv=document.getElementById("orderList");
    orderDiv.innerHTML="";
    allOrders.slice().reverse().forEach((row, i)=>{
        const table=row[1], items=row[2]||"", total=row[3]||"0";
        const card=document.createElement("div");
        card.className="card p-4";
        card.innerHTML=`
            <div class="flex justify-between mb-2"><b>${table}</b> <b class="text-green-400">₹${total}</b></div>
            <pre>${items.replace(/\\n/g,"\n")}</pre>
            <div class="flex gap-2 mt-3">
                <button class="bg-orange-600 p-2 rounded flex-1" onclick="printDoc('KOT','${table}','${encodeURIComponent(items)}','')">KOT</button>
                <button class="bg-blue-600 p-2 rounded flex-1" onclick="printDoc('BILL','${table}','${encodeURIComponent(items)}','${total}')">BILL</button>
            </div>`;
        orderDiv.appendChild(card);
    });
}

// 🔴🔥 UNIVERSAL PRINT FUNCTION 🔥🔴
function printDoc(type,table,itemsEnc,total){
    const items=decodeURIComponent(itemsEnc).replace(/\\n/g,"\n");
    const area=document.getElementById("printSection");

    area.innerHTML = `
    <div class="bill-container" style="font-family: monospace; color: black; background: white; border: 1px solid #eee;">
        <center>
            <b style="font-size: 24px;">ROYAL FOOD CORNER</b><br>
            <span style="font-size: 14px;">Asansol, West Bengal</span>
        </center>
        
        <div style="border-top: 2px dashed black; margin: 10px 0;"></div>
        
        <div style="display: flex; justify-content: space-between; font-size: 16px;">
            <b>${type}</b>
            <b>Table: ${table}</b>
        </div>
        <div style="font-size: 12px; color: #555;">${new Date().toLocaleString()}</div>
        
        <div style="border-top: 1px solid black; margin: 10px 0;"></div>
        
        <div style="font-size: 18px; white-space: pre-wrap; line-height: 1.6; margin: 15px 0;">${items}</div>
        
        ${total ? `
        <div style="border-top: 2px dashed black; margin: 10px 0;"></div>
        <div style="display: flex; justify-content: space-between; font-size: 24px; font-weight: bold;">
            <span>GRAND TOTAL:</span>
            <span>₹${total}</span>
        </div>` : ""}
        
        <div style="border-top: 1px solid black; margin: 15px 0 5px 0;"></div>
        
        <center>
            <b style="font-size: 16px;">Thank You 🙏 Visit Again!</b><br>
            <small style="font-size: 10px;">RP Web Service</small>
        </center>
    </div>
    `;

    area.style.display="block";
    window.print();
    setTimeout(() => { area.style.display="none"; }, 1500);
}

loadOrders();
setInterval(loadOrders, 15000);
</script>
</body>
</html>
