<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; margin: 0; }
            .order-card { 
                border: 1px dashed #333 !important; 
                box-shadow: none !important; 
                width: 100% !important;
                padding: 15px !important;
                page-break-inside: avoid;
                border-radius: 0 !important;
                background: white !important;
            }
            .reprint-tag { display: block !important; border: 2px solid black; text-align: center; font-weight: 900; margin-bottom: 10px; padding: 5px; }
        }
        .reprint-tag { display: none; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-slate-800 pb-8 no-print">
            <div class="mb-4 md:mb-0">
                <h1 class="text-4xl font-black text-white italic tracking-tighter flex items-center gap-3">
                    <span class="bg-red-600 px-3 py-1 rounded-lg not-italic">POS</span> DASHBOARD
                </h1>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-2">Live Order Terminal • Version 2.0</p>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="text-right border-r border-slate-800 pr-6">
                    <p id="connectionStatus" class="text-[10px] font-black text-green-500 uppercase flex items-center gap-2 justify-end">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Terminal Online
                    </p>
                    <p id="lastSync" class="text-xs text-slate-500 mt-1 font-mono">Syncing...</p>
                </div>
                <button onclick="fetchOrders()" class="bg-slate-800 hover:bg-slate-700 text-white w-12 h-12 rounded-2xl flex items-center justify-center transition-all shadow-xl active:scale-90 border border-slate-700">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            </div>
    </div>

    <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const CSV_LINK = "https://docs.google.com/spreadsheets/d/1slZX7KOLmywLkikGt-l0D0_QaOCBMWwPR9vO_PpFI6c/gviz/tq?tqx=out:csv&sheet=Form%20Responses%201";
        
        // Load print counts from local storage
        let printLog = JSON.parse(localStorage.getItem('terminal_print_log')) || {};

        async function fetchOrders() {
            try {
                const res = await fetch(CSV_LINK);
                const text = await res.text();
                const rows = text.split('\n').slice(1).reverse();
                
                const grid = document.getElementById('ordersGrid');
                grid.innerHTML = "";

                rows.forEach((row) => {
                    const data = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (data.length < 4) return;

                    const time = data[0].replace(/"/g, '');
                    const table = data[1].replace(/"/g, '');
                    const items = data[2].replace(/"/g, '').replace(/\n/g, '<br>');
                    const total = data[3].replace(/"/g, '');
                    
                    const orderID = time + table; // Unique ID per order
                    const printCount = printLog[orderID] || 0;
                    const isDuplicate = printCount > 0;

                    grid.innerHTML += `
                        <div class="order-card bg-slate-900 border ${isDuplicate ? 'border-orange-500/50' : 'border-slate-800'} rounded-[2.5rem] p-8 shadow-2xl transition-all hover:border-slate-600 relative overflow-hidden animate-pop">
                            
                            <div class="reprint-tag">*** DUPLICATE RECEIPT (COPY #${printCount}) ***</div>

                            <div class="flex justify-between items-start mb-6 no-print">
                                <span class="text-[9px] font-black px-3 py-1 rounded-full ${isDuplicate ? 'bg-orange-500 text-white' : 'bg-slate-800 text-slate-400'} uppercase">
                                    ${isDuplicate ? 'Already Printed (' + printCount + ')' : 'New Order'}
                                </span>
                                <div class="text-slate-700 text-2xl font-black italic">#POS</div>
                            </div>

                            <div class="mb-6">
                                <h2 class="text-4xl font-black text-white leading-tight">${table}</h2>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">${time}</p>
                            </div>

                            <div class="bg-black/40 rounded-3xl p-6 mb-8 border border-slate-800/50">
                                <p class="text-[9px] text-slate-600 font-black uppercase tracking-widest mb-4 border-b border-slate-800 pb-2 italic">Item Details</p>
                                <div class="text-sm font-medium text-slate-300 leading-relaxed tracking-wide">
                                    ${items}
                                </div>
                            </div>

                            <div class="flex justify-between items-center mb-8 px-2 border-t border-slate-800 pt-6">
                                <span class="text-xs font-black text-slate-500 uppercase tracking-widest">Grand Total</span>
                                <span class="text-3xl font-black text-green-400 tracking-tighter">₹${total}</span>
                            </div>

                            <div class="flex gap-3 no-print">
                                <button onclick="doPrint('${orderID}')" class="flex-1 ${isDuplicate ? 'bg-orange-600' : 'bg-white'} ${isDuplicate ? 'text-white' : 'text-black'} py-4 rounded-2xl font-black text-[11px] uppercase shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                                    <i class="fas ${isDuplicate ? 'fa-redo' : 'fa-print'}"></i> ${isDuplicate ? 'Re-Print Bill' : 'Print Invoice'}
                                </button>
                                <button onclick="this.closest('.order-card').style.opacity='0.25'" class="bg-slate-800 px-6 rounded-2xl text-slate-500 hover:text-green-500 transition-colors">
                                    <i class="fas fa-check-double"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('lastSync').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.log("Sync Error");
            }
        }

        function doPrint(id) {
            // Update print log
            printLog[id] = (printLog[id] || 0) + 1;
            localStorage.setItem('terminal_print_log', JSON.stringify(printLog));
            
            // Refresh screen to show updated count
            fetchOrders();

            // Trigger Print
            setTimeout(() => {
                window.print();
            }, 350);
        }

        // Auto-refresh every 15 seconds
        setInterval(fetchOrders, 15000);
        fetchOrders();
    </script>
</body>
</html>
