<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP RESTO | Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">VIP <span class="text-red-600 uppercase">Admin</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Order Management</p>
            </div>
            <button onclick="fetchOrders()" class="w-10 h-10 bg-slate-100 rounded-xl text-slate-600 flex items-center justify-center hover:bg-red-50 hover:text-red-600 transition-all active:scale-90">
                <i class="fa fa-sync-alt"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 mt-8">
        <div id="orderList" class="space-y-4">
            <div class="text-center py-20 text-slate-300">
                <div class="inline-block w-8 h-8 border-4 border-slate-200 border-t-red-600 rounded-full animate-spin mb-4"></div>
                <p class="text-xs font-bold uppercase tracking-widest">Fetching Live Orders...</p>
            </div>
        </div>
    </main>

    <script>
        // YOUR SECURE APPS SCRIPT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwo-mCRLZUFLcpMvDqvyXXUktaqs4WEtHuGvwylTWgqS9BwnRWxsCzrRS7XhpnDiEyc/exec";

        async function fetchOrders() {
            try {
                // Professional Fetch with Redirect Follow
                const response = await fetch(SCRIPT_URL + "?action=getOrders", {
                    method: 'GET',
                    redirect: 'follow'
                });
                
                const orders = await response.json();
                renderOrders(orders);
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('orderList').innerHTML = `
                    <div class="bg-red-50 border border-red-100 p-6 rounded-2xl text-center">
                        <i class="fa fa-exclamation-triangle text-red-400 text-2xl mb-3"></i>
                        <p class="text-sm font-bold text-red-600">Connection Error</p>
                        <p class="text-[10px] text-red-400 uppercase mt-1">Please check Apps Script Permissions</p>
                        <button onclick="fetchOrders()" class="mt-4 text-[10px] font-bold bg-red-600 text-white px-4 py-2 rounded-lg">RETRY</button>
                    </div>`;
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('orderList');
            if (!orders || orders.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400 font-bold uppercase text-[10px] tracking-widest">No active orders found</div>`;
                return;
            }

            // Newest orders first
            container.innerHTML = orders.reverse().map(order => `
                <div class="order-card bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex-1">
                            <span class="text-[9px] font-black bg-slate-100 px-2 py-0.5 rounded uppercase text-slate-500">${order.txn}</span>
                            <h3 class="text-lg font-black text-slate-800 mt-1">${order.name}</h3>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-bold text-slate-400">${order.time.split('T')[0]}</p>
                            <span class="inline-block mt-1 px-2 py-0.5 rounded-md text-[9px] font-bold uppercase tracking-tighter ${order.status === 'Pending' ? 'bg-amber-100 text-amber-600' : 'bg-green-100 text-green-600'}">
                                ${order.status}
                            </span>
                        </div>
                    </div>

                    <div class="bg-slate-50 rounded-xl p-3 mb-4 border border-dashed border-slate-200">
                        <p class="text-xs font-bold text-slate-700 leading-relaxed">${order.items}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-5">
                        <div class="flex items-center gap-2">
                            <div class="w-7 h-7 bg-red-50 text-red-500 rounded-lg flex items-center justify-center text-[10px]">
                                <i class="fa fa-map-marker-alt"></i>
                            </div>
                            <p class="text-[10px] font-medium text-slate-500 line-clamp-2">${order.address}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <div class="w-7 h-7 bg-green-50 text-green-500 rounded-lg flex items-center justify-center text-[10px]">
                                <i class="fa fa-phone"></i>
                            </div>
                            <p class="text-[10px] font-bold text-slate-800">${order.phone}</p>
                        </div>
                    </div>

                    <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                        <p class="text-sm font-black text-slate-900 italic underline decoration-red-200 decoration-2">₹${order.total}</p>
                        
                        ${order.status === 'Pending' ? `
                            <button onclick="assignAndNotify('${order.txn}', '${order.phone}', '${order.name}')" 
                                class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-slate-200 active:scale-95 transition">
                                Assign Delivery
                            </button>
                        ` : `
                            <div class="text-right">
                                <p class="text-[8px] font-bold text-slate-400 uppercase tracking-widest">Delivering By</p>
                                <p class="text-[10px] font-bold text-green-600">${order.deliveryName || 'Agent Assigned'}</p>
                            </div>
                        `}
                    </div>
                </div>
            `).join('');
        }

        async function assignAndNotify(txn, custPhone, custName) {
            const dName = prompt("Enter Delivery Boy Name:");
            if (!dName) return;
            const dPhone = prompt("Enter Delivery Boy Phone:");
            if (!dPhone) return;

            try {
                // Post Data to Apps Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        action: "assignDelivery",
                        txn: txn,
                        dName: dName,
                        dPhone: dPhone
                    })
                });

                // Auto WhatsApp Trigger
                const msg = `*VIP RESTO*%0A%0AHi ${custName}, your order *#${txn}* is Out for Delivery!%0A%0A🛵 *Delivery Agent:* ${dName}%0A📞 *Phone:* ${dPhone}%0A%0A_Thank you for ordering!_`;
                window.open(`https://wa.me/91${custPhone}?text=${msg}`, '_blank');
                
                fetchOrders(); // Refresh Data
            } catch (e) {
                alert("Error: Check Script Deployment Settings.");
            }
        }

        // Professional Auto-Sync every 45 seconds
        setInterval(fetchOrders, 45000);
        window.onload = fetchOrders;
    </script>
</body>
</html>
