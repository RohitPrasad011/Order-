<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Royal Food POS</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* UI Styles */
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; -webkit-tap-highlight-color:transparent; }
.card { background:#111827; border:1px solid #1f2937; border-radius:15px; padding:15px; margin-bottom:15px; position: relative; transition: 0.3s; }
.selected-card { border-color: #3b82f6; background: #1e293b; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

button { font-weight:700; font-size:14px; height:45px; border-radius:10px; }
.btn-kot { background:#ea580c; color:#fff; }
.btn-bill { background:#3b82f6; color:#fff; }
.btn-merge { background:#10b981; color:#fff; position: fixed; bottom: 20px; right: 20px; z-index: 100; padding: 0 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); display: none; }

pre { background:#000; padding:10px; border-radius:10px; font-size:14px; white-space:pre-wrap; color:#cbd5e1; border: 1px solid #1f2937; }

/* Critical Print Styles for Browser Preview */
@media print {
    body * { visibility: hidden; }
    #printSection, #printSection * { visibility: visible; display: block !important; }
    #printSection { position: absolute; left: 0; top: 0; width: 100%; background: white !important; color: black !important; padding: 15px; }
    @page { margin: 0; size: auto; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
}
#printSection { display: none; }
</style>
</head>

<body class="p-4 pb-24">

<header class="flex justify-between items-center mb-6 sticky top-0 bg-[#05070a] py-2 z-50 border-b border-gray-900">
  <h1 class="text-xl font-black text-white italic tracking-tighter uppercase">Royal Food <span class="text-orange-500 font-bold text-2xl">POS</span></h1>
  <div class="flex gap-2">
    <button onclick="toggleMergeMode()" id="mergeModeBtn" class="bg-gray-800 text-[10px] px-3 h-8 rounded-lg uppercase border border-gray-700">Merge Orders</button>
    <button onclick="loadOrders()" class="bg-gray-800 text-[10px] px-3 h-8 rounded-lg uppercase border border-gray-700">Refresh</button>
  </div>
</header>

<div id="mergeHint" class="hidden bg-blue-900/40 border border-blue-600/50 p-3 rounded-lg mb-4 text-[10px] text-blue-300 uppercase tracking-widest text-center">
    Select multiple orders to merge into one bill
</div>

<div id="orderList"></div>

<button onclick="printMergedBill()" id="finalMergeBtn" class="btn-merge font-black italic uppercase">
    Print Merged Bill (₹<span id="mergeTotalDisplay">0</span>)
</button>

<div id="printSection"></div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

let allOrders = [];
let selectedOrders = [];
let isMergeMode = false;

async function loadOrders() {
    try {
        const res = await fetch(SHEET_URL + "&t=" + Date.now());
        const data = await res.text();
        const rows = data.split("\n").map(r => r.split(","));
        allOrders = rows.filter(r => r[1] && r[1].toLowerCase() !== "table");
        renderOrders();
    } catch(e) { console.error("Sync Error:", e); }
}

function renderOrders() {
    const orderDiv = document.getElementById("orderList");
    orderDiv.innerHTML = "";
    selectedOrders = [];
    updateMergeUI();

    allOrders.slice().reverse().forEach((row, index) => {
        const [time, table, items, total] = row;
        const realIndex = allOrders.length - 1 - index;
        const cardId = `card-${realIndex}`;

        orderDiv.innerHTML += `
        <div id="${cardId}" class="card" onclick="handleCardClick('${cardId}', ${realIndex})">
            <div class="flex justify-between items-center mb-2">
                <span class="font-black text-lg uppercase tracking-wider text-white">${table}</span>
                <span class="text-green-400 font-bold text-2xl tracking-tighter">₹${total}</span>
            </div>
            <pre>${items.replace(/\\n/g, '\n')}</pre>
            ${!isMergeMode ? `
            <div class="flex gap-3 mt-4">
                <button class="btn-kot flex-1" onclick="doPrint('KOT','${table}','${encodeURIComponent(items)}','')">KOT</button>
                <button class="btn-bill flex-1" onclick="doPrint('BILL','${table}','${encodeURIComponent(items)}','${total}')">PRINT BILL</button>
            </div>` : ''}
        </div>`;
    });
}

function toggleMergeMode() {
    isMergeMode = !isMergeMode;
    const btn = document.getElementById("mergeModeBtn");
    btn.innerHTML = isMergeMode ? "Cancel Merge" : "Merge Orders";
    btn.classList.toggle("bg-red-600");
    document.getElementById("mergeHint").classList.toggle("hidden");
    renderOrders();
}

function handleCardClick(cardId, index) {
    if (!isMergeMode) return;
    const card = document.getElementById(cardId);
    const orderIndex = selectedOrders.indexOf(index);

    if (orderIndex > -1) {
        selectedOrders.splice(orderIndex, 1);
        card.classList.remove("selected-card");
    } else {
        selectedOrders.push(index);
        card.classList.add("selected-card");
    }
    updateMergeUI();
}

function updateMergeUI() {
    const btn = document.getElementById("finalMergeBtn");
    const display = document.getElementById("mergeTotalDisplay");
    
    if (isMergeMode && selectedOrders.length > 1) {
        let totalSum = 0;
        selectedOrders.forEach(idx => {
            totalSum += parseInt(allOrders[idx][3]) || 0;
        });
        display.innerText = totalSum;
        btn.style.display = "block";
    } else {
        btn.style.display = "none";
    }
}

function printMergedBill() {
    let combinedItems = "";
    let combinedTotal = 0;
    let tables = [];

    selectedOrders.sort((a,b) => a-b).forEach(idx => {
        combinedItems += decodeURIComponent(allOrders[idx][2]).replace(/\\n/g, '\n') + "\n";
        combinedTotal += parseInt(allOrders[idx][3]) || 0;
        if (!tables.includes(allOrders[idx][1])) tables.push(allOrders[idx][1]);
    });

    doPrint('BILL', tables.join(" + "), encodeURIComponent(combinedItems), combinedTotal);
    toggleMergeMode();
}

function doPrint(type, table, itemsEnc, total) {
    const items = decodeURIComponent(itemsEnc).replace(/\\n/g, '\n');
    const area = document.getElementById("printSection");
    
    area.innerHTML = `
    <div style="width:270px; font-family:monospace; color:black; background:white;">
        <center>
            <b style="font-size:20px;">MY RESTAURANT</b><br>
            <small>Asansol, West Bengal</small>
        </center>
        <hr style="border-top:1px dashed black; margin:10px 0">
        <div style="display:flex; justify-content:space-between; font-size:14px;">
            <b>${type}</b>
            <b>Table: ${table}</b>
        </div>
        <div style="font-size:11px; margin-top:2px;">Date: ${new Date().toLocaleString()}</div>
        <hr style="border-top:1px solid black; margin:10px 0">
        <div style="white-space:pre-wrap; font-size:15px; line-height:1.4; min-height:50px;">${items}</div>
        <hr style="border-top:1px dashed black; margin:10px 0">
        ${total ? `<div style="text-align:right; font-weight:bold; font-size:20px;">TOTAL: ₹${total}</div>` : ''}
        <hr style="border-top:1px dashed black; margin:10px 0">
        <center>
            <b style="font-size:14px;">Thank You 🙏 Visit Again!</b><br>
            <small style="font-size:10px; display:block; margin-top:5px;">Instagram: @rpwebservice</small>
            <small style="font-size:10px;">Contact: +91 0000000000</small>
        </center>
    </div>`;

    setTimeout(() => {
        window.print();
        area.innerHTML = ""; 
    }, 400);
}

loadOrders();
setInterval(loadOrders, 20000);
</script>
</body>
</html>
