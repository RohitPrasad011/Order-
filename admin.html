<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Admin - Manual Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .tab-active { border-bottom: 4px solid #ef4444; color: white; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto no-print">
        <header class="flex justify-between items-center mb-6 border-b border-slate-900 pb-4">
            <div>
                <h1 class="text-2xl font-black italic uppercase text-red-600 tracking-tighter">POS TERMINAL</h1>
                <p id="syncStatus" class="text-[10px] text-slate-500 font-bold uppercase">Manual Refresh Only</p>
            </div>
            <button onclick="fetchOrders()" class="bg-red-600 p-4 rounded-2xl shadow-lg shadow-red-900/20 active:scale-90 transition-all">
                <i class="fas fa-sync-alt text-xl"></i>
            </button>
        </header>

        <div class="flex gap-6 mb-8">
            <button onclick="switchTab('live')" id="tab-live" class="pb-2 text-xs font-black uppercase tab-active">Live Orders</button>
            <button onclick="switchTab('history')" id="tab-history" class="pb-2 text-xs font-black uppercase text-slate-600">History</button>
        </div>

        <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <p class="col-span-full text-center py-20 text-slate-700 font-bold">Press Refresh to Load Orders</p>
        </div>
    </div>

    <script>
        // ✅ आपका CSV लिंक (सुनिश्चित करें कि Sheet में 'Publish to web' चालू है)
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";
        
        let currentTab = 'live';
        let acceptedOrders = JSON.parse(localStorage.getItem('pos_final_stable_history')) || [];
        let masterData = [];

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-live').className = tab === 'live' ? 'pb-2 text-xs font-black uppercase tab-active' : 'pb-2 text-xs font-black uppercase text-slate-600';
            document.getElementById('tab-history').className = tab === 'history' ? 'pb-2 text-xs font-black uppercase tab-active' : 'pb-2 text-xs font-black uppercase text-slate-600';
            renderOrders();
        }

        async function fetchOrders() {
            const statusBox = document.getElementById('syncStatus');
            statusBox.innerText = "Fetching Data...";
            
            try {
                const response = await fetch(`${SHEET_URL}&nocache=${Date.now()}`);
                const csvText = await response.text();
                
                // CSV Parsing (Simple and Direct)
                const rows = csvText.split('\n').filter(r => r.trim() !== "");
                const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                // आपकी शीट के हेडर ढूंढना
                const tIdx = headers.indexOf("Timestamp");
                const bIdx = headers.indexOf("TABLE NO.");
                const iIdx = headers.indexOf("ITEMS");
                const mIdx = headers.indexOf("TOTAL MOUNT");

                masterData = rows.slice(1).reverse().map(row => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/"/g, ''));
                    return {
                        time: cols[tIdx] || "N/A",
                        table: cols[bIdx] || "Unknown",
                        items: cols[iIdx]?.replace(/\|/g, '<br>').replace(/\\n/g, '<br>') || "No Items Found",
                        total: cols[mIdx] || "0",
                        id: (cols[tIdx] + cols[bIdx]).replace(/\s+/g, '')
                    };
                });

                renderOrders();
                statusBox.innerText = "Last Updated: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error(err);
                statusBox.innerText = "Error: Check Internet/Link";
            }
        }

        function renderOrders() {
            const container = document.getElementById('ordersGrid');
            container.innerHTML = "";
            let found = 0;

            masterData.forEach(order => {
                const isAccepted = acceptedOrders.includes(order.id);
                if ((currentTab === 'live' && !isAccepted) || (currentTab === 'history' && isAccepted)) {
                    found++;
                    container.innerHTML += `
                        <div class="bg-slate-900 border border-slate-800 rounded-[2rem] p-6 shadow-xl">
                            <h2 class="text-3xl font-black text-white">${order.table}</h2>
                            <p class="text-[9px] text-slate-500 font-bold uppercase mb-4">${order.time}</p>
                            <div class="bg-black/40 rounded-2xl p-4 mb-4 border border-slate-800 text-sm italic text-slate-300">
                                ${order.items}
                            </div>
                            <div class="flex justify-between items-center mb-6 border-t border-slate-800 pt-4 px-2">
                                <span class="text-xs font-bold text-slate-500 uppercase">Grand Total</span>
                                <span class="text-xl font-black text-green-400 font-mono italic">₹${order.total}</span>
                            </div>
                            <div class="flex flex-col gap-2">
                                <div class="flex gap-2">
                                    <button onclick="printBill('${order.table}', '${order.items}', '${order.total}', 'KOT')" class="flex-1 bg-orange-700/20 text-orange-500 py-3 rounded-xl font-bold text-[10px] uppercase border border-orange-700/30">KOT</button>
                                    <button onclick="printBill('${order.table}', '${order.items}', '${order.total}', 'BILL')" class="flex-1 bg-white text-black py-3 rounded-xl font-bold text-[10px] uppercase">Bill</button>
                                </div>
                                ${!isAccepted ? `
                                <button onclick="acceptOrder('${order.id}')" class="w-full bg-green-600 text-white py-2 rounded-xl font-black text-[10px] uppercase">
                                    Accept Order ✅
                                </button>` : ''}
                            </div>
                        </div>
                    `;
                }
            });

            if (found === 0) container.innerHTML = `<p class="col-span-full text-center py-20 text-slate-700 uppercase font-black tracking-widest italic">No ${currentTab} orders</p>`;
        }

        function acceptOrder(id) {
            acceptedOrders.push(id);
            localStorage.setItem('pos_final_stable_history', JSON.stringify(acceptedOrders));
            renderOrders();
        }

        function printBill(table, items, total, type) {
            const win = window.open('', '_blank', 'width=400,height=600');
            win.document.write(`
                <html><body style="font-family:monospace;padding:20px;">
                <center><h2>${type}</h2><h1>${table}</h1><hr></center>
                <div style="font-size:14px;margin:20px 0;">${items}</div>
                ${type==='BILL' ? `<hr><h3>TOTAL: ₹${total}</h3>` : ''}
                <hr><center><p>POS SYSTEM</p></center>
                <script>window.onload=function(){window.print();window.close();}<\/script></body></html>
            `);
            win.document.close();
        }
    </script>
</body>
</html>
