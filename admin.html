<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS Admin Pro - Final</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; }
.history-card { background:#0f172a; border:1px solid #374151; opacity:0.6; }
.selected-card { border:2px solid #3b82f6 !important; }
button { font-weight:700; font-size:11px; height:38px; border-radius:8px; padding:0 10px; }
.btn-kot { background:#ea580c; color:white; flex:1; }
.btn-print { background:#3b82f6; color:white; flex:1; }
.btn-save { background:#eab308; color:black; flex:1; }
.badge { background:#ef4444; padding:2px 8px; border-radius:20px; font-size:12px; }
pre { background:#000; padding:8px; border-radius:6px; font-size:13px; white-space:pre-wrap; }

@media print {
  body * { visibility:hidden; }
  #printSection, #printSection * { visibility:visible; }
  #printSection { position:absolute; left:0; top:0; width:100%; background:white; color:black; }
}
</style>
</head>

<body class="p-4 pb-40">

<header class="sticky top-0 bg-black/80 backdrop-blur py-3 mb-6 border-b border-gray-800">
<div class="flex justify-between items-center mb-3">
<h1 class="text-xl font-black">POS TERMINAL <span id="orderCount" class="badge">0</span></h1>
<div class="flex gap-2">
<button onclick="toggleSelectMode()" id="mergeBtn" class="bg-blue-600 text-white">MERGE</button>
<button onclick="loadOrders()" class="bg-gray-700 text-white">REFRESH</button>
</div>
</div>
<input type="text" id="searchInput" onkeyup="filterOrders()" placeholder="Search Table..." class="w-full bg-gray-900 border border-gray-700 rounded-lg h-10 px-3">
</header>

<h2 class="text-xs text-orange-400 font-bold mb-3">Incoming Orders</h2>
<div id="orderList" class="grid md:grid-cols-2 gap-4 mb-8"></div>

<hr class="border-gray-800 my-6">

<h2 class="text-xs text-blue-400 font-bold mb-3">Merged Table Bills</h2>
<div id="mergedList" class="flex flex-col gap-4 mb-8"></div>

<hr class="border-gray-800 my-6">

<h2 class="text-xs text-gray-400 font-bold mb-3">History (Auto 24h Clear)</h2>
<div id="historyList" class="flex flex-col gap-4"></div>

<div id="printSection" style="display:none;"></div>
<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>

const SHEET_URL = "PASTE_YOUR_SHEET_CSV_LINK_HERE";

let history = JSON.parse(localStorage.getItem('pos_history_v14')) || [];
let mergedBills = JSON.parse(localStorage.getItem('pos_merged_v14')) || {};
let selectedItems = [];
let isSelecting = false;
let lastLiveCount = 0;

function cleanupHistory(){
  const now = Date.now();
  history = history.filter(h => now - h.saveTime < 86400000);
  localStorage.setItem('pos_history_v14', JSON.stringify(history));
}

async function loadOrders(){
  cleanupHistory();
  try{
    const res = await fetch(SHEET_URL + "&t=" + Date.now());
    const text = await res.text();
    const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g,'').trim()));
    const headers = rows[0];

    const tIdx = headers.findIndex(h => h.toUpperCase().includes("TABLE"));
    const iIdx = headers.findIndex(h => h.toUpperCase().includes("ITEM"));
    const pIdx = headers.findIndex(h => h.toUpperCase().includes("TOTAL") || h.toUpperCase().includes("AMOUNT"));
    const timeIdx = headers.findIndex(h => h.toUpperCase().includes("TIMESTAMP"));

    const incomingDiv = document.getElementById("orderList");
    const historyDiv = document.getElementById("historyList");
    incomingDiv.innerHTML = "";
    historyDiv.innerHTML = "";

    let liveCount = 0;

    for(let i = rows.length-1; i>=1; i--){
      const table = rows[i][tIdx];
      const items = rows[i][iIdx] || "";
      const amount = parseFloat(rows[i][pIdx]) || 0;
      const time = rows[i][timeIdx] || "";
      if(!table) continue;

      const id = (table+time).replace(/\s/g,'');
      const inHistory = history.find(h=>h.id===id);
      const isSelected = selectedItems.find(s=>s.id===id);

      const card = `
      <div class="card ${inHistory?'history-card':''} ${isSelected?'selected-card':''}">
        <div class="flex justify-between">
          <span class="font-bold">${table}</span>
          <span class="text-green-400 font-bold">₹${amount}</span>
        </div>
        <pre>${items}</pre>
        <div class="flex gap-2 mt-3 flex-wrap">
          <button class="btn-kot" onclick="printDoc('KOT','${table}','${encodeURIComponent(items)}')">KOT</button>
          <button class="btn-print" onclick="printDoc('BILL','${table}','${encodeURIComponent(items)}',${amount})">PRINT</button>
          ${!inHistory?`<button class="btn-save" onclick="saveHistory('${id}','${table}','${encodeURIComponent(items)}',${amount})">SAVE</button>`:''}
          ${isSelecting && !inHistory?`<button class="bg-purple-600 text-white flex-1" onclick="selectForMerge('${id}','${table}','${encodeURIComponent(items)}',${amount})">${isSelected?'DESELECT':'SELECT'}</button>`:''}
        </div>
      </div>`;

      if(inHistory) historyDiv.innerHTML+=card;
      else { incomingDiv.innerHTML+=card; liveCount++; }
    }

    if(liveCount>lastLiveCount && lastLiveCount!==0) document.getElementById('beep').play();
    lastLiveCount=liveCount;
    document.getElementById("orderCount").innerText=liveCount;
    renderMerged();

  }catch(e){console.log(e);}
}

function saveHistory(id,table,items,amount){
  history.push({id,table,items:decodeURIComponent(items),amount,saveTime:Date.now()});
  localStorage.setItem('pos_history_v14',JSON.stringify(history));
  loadOrders();
}

function toggleSelectMode(){
  isSelecting=!isSelecting;
  selectedItems=[];
  document.getElementById("mergeBtn").innerText=isSelecting?"CANCEL":"MERGE";
  loadOrders();
}

function selectForMerge(id,table,items,amount){
  const idx=selectedItems.findIndex(s=>s.id===id);
  if(idx>-1) selectedItems.splice(idx,1);
  else selectedItems.push({id,table,items:decodeURIComponent(items),amount});
  if(selectedItems.length>=2){
    const target=prompt("Merge Into Table:",selectedItems[0].table);
    if(!target) return;
    if(!mergedBills[target]) mergedBills[target]={items:[],total:0};
    selectedItems.forEach(o=>{
      mergedBills[target].items.push(o.items);
      mergedBills[target].total+=o.amount;
      history.push({id:o.id,table:o.table,items:o.items,amount:o.amount,saveTime:Date.now()});
    });
    localStorage.setItem('pos_merged_v14',JSON.stringify(mergedBills));
    localStorage.setItem('pos_history_v14',JSON.stringify(history));
    isSelecting=false; selectedItems=[];
    document.getElementById("mergeBtn").innerText="MERGE";
    loadOrders();
  } else loadOrders();
}

function renderMerged(){
  const div=document.getElementById("mergedList");
  div.innerHTML="";
  for(let t in mergedBills){
    const bill=mergedBills[t];
    div.innerHTML+=`
    <div class="card border border-blue-600">
      <div class="flex justify-between">
        <span class="font-bold">${t}</span>
        <span class="text-green-400 font-bold">₹${bill.total}</span>
      </div>
      <pre>${bill.items.join('\n---\n')}</pre>
      <div class="flex gap-2 mt-3">
        <button class="btn-print" onclick="printDoc('FINAL BILL','${t}','${encodeURIComponent(bill.items.join('\n'))}',${bill.total})">PRINT FINAL</button>
        <button class="bg-red-600 text-white flex-1" onclick="clearTable('${t}')">SETTLE</button>
      </div>
    </div>`;
  }
}

function clearTable(t){
  if(confirm("Clear "+t+" ?")){
    delete mergedBills[t];
    localStorage.setItem('pos_merged_v14',JSON.stringify(mergedBills));
    loadOrders();
  }
}

function printDoc(type,table,items,total=0){

  const restaurant="ROYAL FOOD CORNER";
  const address="Asansol, West Bengal";
  const phone="Ph: 9876543210";

  const decoded=decodeURIComponent(items);
  const lines=decoded.split('\n');
  let rows="";

  lines.forEach(line=>{
    if(!line.trim()) return;
    let qty=(line.match(/x\s*(\d+)/i)||["","1"])[1];
    let price=(line.match(/(\d+(\.\d+)?)\s*$/)||["",""])[1];
    let name=line.replace(/x\s*\d+/i,'').replace(/-?\s*\d+(\.\d+)?\s*$/,'').trim();
    rows+=`<tr><td style="width:55%">${name}</td><td style="width:15%;text-align:center">${qty}</td><td style="width:30%;text-align:right">${price}</td></tr>`;
  });

  const area=document.getElementById("printSection");
  area.style.display="block";
  area.innerHTML=`
  <div style="width:280px;font-family:monospace;padding:8px;color:black;">
    <div style="text-align:center;font-weight:bold;font-size:15px">${restaurant}</div>
    <div style="text-align:center;font-size:12px">${address}<br>${phone}</div>
    <hr style="border-top:1px dashed black">
    <strong>${type}</strong><br>
    Table: ${table}<br>
    ${new Date().toLocaleString()}
    <hr style="border-top:1px dashed black">
    <table style="width:100%;font-size:13px">
      <tr><th style="text-align:left">Item</th><th>Qty</th><th style="text-align:right">Price</th></tr>
      ${rows}
    </table>
    ${total?`<hr style="border-top:1px dashed black"><div style="text-align:right;font-weight:bold">Total: ₹${total}</div>`:""}
    <hr style="border-top:1px dashed black">
    <div style="text-align:center">Thank You 🙏</div>
  </div>`;
  window.print();
  area.style.display="none";
}

function filterOrders(){
  const val=document.getElementById("searchInput").value.toUpperCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.innerText.toUpperCase().includes(val)?"":"none";
  });
}

loadOrders();
setInterval(loadOrders,15000);

</script>
</body>
</html>
