<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Admin - Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media print { .no-print { display: none !important; } }
        .accepted { border-color: #10b981 !important; opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-8 no-print">
            <div>
                <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase">Admin Dashboard</h1>
                <p id="syncStatus" class="text-[10px] text-green-500 font-bold uppercase tracking-widest mt-1">Checking Live Orders...</p>
            </div>
            <button onclick="fetchOrders()" class="bg-slate-800 p-4 rounded-2xl border border-slate-700 active:scale-90">
                <i class="fas fa-sync-alt"></i>
            </button>
        </header>

        <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="col-span-full text-center py-20 text-slate-600 font-bold uppercase italic animate-pulse">
                Fetching Orders...
            </div>
        </div>
    </div>

    <script>
        // ✅ आपका नया Published CSV लिंक
        const PUBLISHED_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";
        
        async function fetchOrders() {
            try {
                // कैश (Cache) से बचने के लिए टाइमस्टैम्प जोड़ना
                const response = await fetch(PUBLISHED_URL + "&t=" + new Date().getTime());
                const csvData = await response.text();
                
                // CSV को पंक्तियों में बांटें और खाली लाइनें हटाएं
                const rows = csvData.split('\n').filter(row => row.trim() !== "").slice(1).reverse();
                const container = document.getElementById('ordersGrid');
                
                if (rows.length === 0) {
                    container.innerHTML = "<p class='col-span-full text-center text-slate-500 py-20 font-bold'>NO NEW ORDERS IN SHEET</p>";
                    return;
                }

                container.innerHTML = "";

                rows.forEach((row, index) => {
                    // CSV कॉलम को सही से बांटने के लिए Regex
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    
                    if (cols && cols.length >= 3) {
                        const time = cols[0].replace(/"/g, '');
                        const table = cols[1].replace(/"/g, '');
                        const items = cols[2].replace(/"/g, '').replace(/\\n/g, '<br>').replace(/\|/g, '<br>');
                        const total = cols[3] ? cols[3].replace(/"/g, '') : "0";

                        container.innerHTML += `
                            <div class="order-card bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl relative" id="card-${index}">
                                <div class="flex justify-between items-start mb-4 no-print">
                                    <span id="status-${index}" class="bg-red-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase">New</span>
                                    <span class="text-slate-800 font-black italic">#${rows.length - index}</span>
                                </div>
                                <h2 class="text-4xl font-black text-white">${table}</h2>
                                <p class="text-[10px] text-slate-500 font-bold uppercase mb-6">${time}</p>
                                <div class="bg-black/40 rounded-3xl p-6 mb-6 border border-slate-800/50 text-sm italic text-slate-300">
                                    ${items}
                                </div>
                                <div class="flex justify-between items-center mb-8 border-t border-slate-800 pt-6 px-2">
                                    <span class="text-xs font-bold text-slate-500 uppercase">Total</span>
                                    <span class="text-2xl font-black text-green-400 font-mono">₹${total}</span>
                                </div>
                                <div class="flex gap-2 no-print">
                                    <button onclick="window.print()" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase">Print</button>
                                    <button onclick="acceptOrder(${index})" class="bg-slate-800 text-green-500 px-6 rounded-2xl border border-slate-700">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                });
                
                document.getElementById('syncStatus').innerText = "Last Update: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Error:", error);
                document.getElementById('ordersGrid').innerHTML = "<p class='col-span-full text-red-500 text-center'>Error Loading Data...</p>";
            }
        }

        function acceptOrder(id) {
            document.getElementById(`card-${id}`).classList.add('accepted');
            document.getElementById(`status-${id}`).innerText = "Accepted ✅";
            document.getElementById(`status-${id}`).className = "bg-green-600 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase";
        }

        setInterval(fetchOrders, 10000);
        fetchOrders();
    </script>
</body>
</html>
