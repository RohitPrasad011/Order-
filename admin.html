<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP RESTO | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black text-slate-800">VIP <span class="text-red-600">ADMIN</span></h1>
            <button onclick="fetchOrders()" class="bg-slate-100 p-2 rounded-lg text-slate-600 hover:bg-red-50 hover:text-red-600 transition">
                <i class="fa fa-sync-alt"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 mt-8">
        <div id="orderList" class="space-y-4">
            <div class="text-center py-20 text-slate-400">
                <i class="fa fa-circle-notch fa-spin text-3xl mb-3"></i>
                <p class="text-xs font-bold uppercase tracking-widest">Fetching Orders...</p>
            </div>
        </div>
    </main>

    <script>
        // Updated with your NEW SCRIPT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyC2902Qtn7T660LYav70VhWkqFNpaD_fxZHhe1CWb0dzoOXBNJzf2k95CO8bEtM5C3/exec";

        async function fetchOrders() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getOrders", {
                    method: 'GET',
                    redirect: 'follow'
                });
                const orders = await response.json();
                renderOrders(orders);
            } catch (error) {
                document.getElementById('orderList').innerHTML = `
                    <div class="bg-red-50 text-red-600 p-6 rounded-2xl text-center border border-red-100">
                        <p class="font-bold">Sync Error</p>
                        <p class="text-[10px] uppercase mt-1">Check Apps Script "Anyone" Access</p>
                    </div>`;
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('orderList');
            if (!orders || orders.length === 0) {
                container.innerHTML = `<p class="text-center py-10 text-slate-400 text-xs font-bold uppercase">No Orders Yet</p>`;
                return;
            }

            container.innerHTML = orders.reverse().map(order => `
                <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-black text-slate-800">${order.name}</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${order.time.split('T')[0]}</p>
                        </div>
                        <span class="px-2 py-1 rounded-md text-[9px] font-bold uppercase ${order.status === 'Pending' ? 'bg-amber-100 text-amber-600' : 'bg-green-100 text-green-600'}">
                            ${order.status}
                        </span>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl mb-4 border border-dashed">
                        <p class="text-xs font-bold text-slate-600">${order.items}</p>
                    </div>
                    <div class="flex justify-between items-center">
                        <p class="text-sm font-black text-slate-900">₹${order.total}</p>
                        <button onclick="assignOrder('${order.txn}', '${order.phone}', '${order.name}')" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest">Assign</button>
                    </div>
                </div>
            `).join('');
        }

        async function assignOrder(txn, phone, name) {
            const dName = prompt("Delivery Boy Name:");
            const dPhone = prompt("Delivery Boy Phone:");
            if(!dName || !dPhone) return;

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "assignDelivery", txn, dName, dPhone })
            });

            const msg = `Order ID: ${txn} is Out for Delivery! %0ABoy: ${dName} (${dPhone})`;
            window.open(`https://wa.me/91${phone}?text=${msg}`, '_blank');
            fetchOrders();
        }

        window.onload = fetchOrders;
        setInterval(fetchOrders, 60000); // Auto-refresh every 1 min
    </script>
</body>
</html>
