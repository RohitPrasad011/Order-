<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Food Corner - POS Admin</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; }
.card { background:#111827; border:1px solid #1f2937; border-radius:12px; padding:15px; }
.history-card { background:#0f172a; border:1px solid #374151; opacity:0.6; }
.selected-card { border:2px solid #3b82f6 !important; }
button { font-weight:700; font-size:11px; height:38px; border-radius:8px; padding:0 10px; }
.btn-kot { background:#ea580c; color:white; flex:1; }
.btn-print { background:#3b82f6; color:white; flex:1; }
.btn-save { background:#eab308; color:black; flex:1; }
.badge { background:#ef4444; padding:2px 8px; border-radius:20px; font-size:12px; }

@media print {
  body * { visibility:hidden; }
  #printSection, #printSection * { visibility:visible; }
  #printSection { position:absolute; left:0; top:0; width:100%; background:white; color:black; }
}
</style>
</head>

<body class="p-4 pb-40">

<header class="sticky top-0 bg-black/80 py-3 mb-6 border-b border-gray-800">
<div class="flex justify-between items-center mb-3">
<h1 class="text-xl font-black">ROYAL FOOD CORNER <span id="orderCount" class="badge">0</span></h1>
<button onclick="loadOrders()" class="bg-gray-700 text-white px-3 rounded">REFRESH</button>
</div>
<input type="text" id="searchInput" onkeyup="filterOrders()" placeholder="Search Table..." class="w-full bg-gray-900 border border-gray-700 rounded-lg h-10 px-3">
</header>

<h2 class="text-xs text-orange-400 font-bold mb-3">Incoming Orders</h2>
<div id="orderList" class="grid md:grid-cols-2 gap-4 mb-8"></div>

<hr class="border-gray-800 my-6">

<h2 class="text-xs text-gray-400 font-bold mb-3">History (Auto 24h Clear)</h2>
<div id="historyList" class="flex flex-col gap-4"></div>

<div id="printSection" style="display:none;"></div>
<audio id="beep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

let history = JSON.parse(localStorage.getItem('pos_history')) || [];
let lastLiveCount = 0;

function cleanupHistory(){
  const now = Date.now();
  history = history.filter(h => now - h.saveTime < 86400000);
  localStorage.setItem('pos_history', JSON.stringify(history));
}

async function loadOrders(){
  cleanupHistory();
  const res = await fetch(SHEET_URL + "&t=" + Date.now());
  const text = await res.text();

  const rows = text.split('\n').map(r => r.split(','));
  const headers = rows[0].map(h=>h.trim().toUpperCase());

  const tIdx = headers.findIndex(h => h.includes("TABLE"));
  const timeIdx = headers.findIndex(h => h.includes("TIMESTAMP"));

  const orderList = document.getElementById("orderList");
  const historyList = document.getElementById("historyList");

  orderList.innerHTML="";
  historyList.innerHTML="";

  let liveCount=0;

  for(let i=rows.length-1;i>=1;i--){
    const row = rows[i];
    if(!row[tIdx]) continue;

    const table = row[tIdx];
    const time = row[timeIdx] || "";
    const id = (table+time).replace(/\s/g,'');

    let itemsHTML="";
    let total=0;

    // Automatically detect item columns
    for(let c=0;c<headers.length;c++){
      if(headers[c].includes("ITEM")){
        const name=row[c];
        const qty=row[c+1];
        const price=row[c+2];
        if(name){
          itemsHTML+=`${name} x${qty} - ₹${price}\n`;
          total+=parseFloat(price||0);
        }
      }
    }

    const inHistory = history.find(h=>h.id===id);

    const card = `
    <div class="card ${inHistory?'history-card':''}">
      <div class="flex justify-between">
        <span class="font-bold">${table}</span>
        <span class="text-green-400 font-bold">₹${total}</span>
      </div>
      <pre>${itemsHTML}</pre>
      <div class="flex gap-2 mt-3">
        <button class="btn-kot" onclick="printDoc('KOT','${table}','${encodeURIComponent(itemsHTML)}')">KOT</button>
        <button class="btn-print" onclick="printDoc('BILL','${table}','${encodeURIComponent(itemsHTML)}',${total})">PRINT</button>
        ${!inHistory?`<button class="btn-save" onclick="saveHistory('${id}','${table}','${encodeURIComponent(itemsHTML)}',${total})">SAVE</button>`:''}
      </div>
    </div>`;

    if(inHistory) historyList.innerHTML+=card;
    else{ orderList.innerHTML+=card; liveCount++; }
  }

  if(liveCount>lastLiveCount && lastLiveCount!==0){
    document.getElementById("beep").play();
  }

  lastLiveCount=liveCount;
  document.getElementById("orderCount").innerText=liveCount;
}

function saveHistory(id,table,items,total){
  history.push({id,table,items:decodeURIComponent(items),total,saveTime:Date.now()});
  localStorage.setItem('pos_history',JSON.stringify(history));
  loadOrders();
}

function printDoc(type,table,items,total=0){

  const area=document.getElementById("printSection");
  area.style.display="block";

  area.innerHTML=`
  <div style="width:280px;font-family:monospace;padding:10px;">
    <div style="text-align:center;font-weight:bold;font-size:16px">ROYAL FOOD CORNER</div>
    <div style="text-align:center;font-size:12px">Asansol, West Bengal</div>
    <hr style="border-top:1px dashed black">
    <strong>${type}</strong><br>
    Table: ${table}<br>
    ${new Date().toLocaleString()}
    <hr style="border-top:1px dashed black">
    <pre style="font-size:13px">${decodeURIComponent(items)}</pre>
    ${total?`<hr style="border-top:1px dashed black"><div style="text-align:right;font-weight:bold">Total: ₹${total}</div>`:""}
    <hr style="border-top:1px dashed black">
    <div style="text-align:center">Thank You 🙏</div>
  </div>`;

  window.print();
  area.style.display="none";
}

function filterOrders(){
  const val=document.getElementById("searchInput").value.toUpperCase();
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display=c.innerText.toUpperCase().includes(val)?"":"none";
  });
}

loadOrders();
setInterval(loadOrders,15000);

</script>
</body>
</html>
