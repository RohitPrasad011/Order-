<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard | Order Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .order-card { border-radius: 12px; transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-2px); }
        .btn-accept { background-color: #10b981; }
        .btn-reject { background-color: #ef4444; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b pb-4">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-900">Live Orders</h1>
                <p class="text-slate-500 text-sm">Monitor and manage incoming requests in real-time</p>
            </div>
            <div class="text-right">
                <span id="orderCount" class="bg-blue-100 text-blue-700 text-xs font-bold px-3 py-1 rounded-full">0 NEW</span>
            </div>
        </div>
        
        <div id="ordersContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <p class="text-slate-400 italic">Connecting to secure server...</p>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx7YGOpB62IT3NTsFPvmiZVZ7aVGPpyKY5ufIGOzdte_eR6E7HpU__nt2NHjPFOZXoq/exec";

        async function fetchOrders() {
            try {
                const response = await fetch(SCRIPT_URL + "?action=getOrders");
                const orders = await response.json();
                renderOrders(orders);
            } catch (error) {
                console.error("Connection Error:", error);
                document.getElementById('ordersContainer').innerHTML = `<div class="text-red-500">Sync Error. Please refresh.</div>`;
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersContainer');
            const pendingOrders = orders.filter(o => o.status === "Pending").reverse();
            document.getElementById('orderCount').innerText = `${pendingOrders.length} NEW`;
            
            if (pendingOrders.length === 0) {
                container.innerHTML = `<div class="col-span-full py-10 text-center text-slate-400">No active orders at the moment.</div>`;
                return;
            }

            container.innerHTML = pendingOrders.map(order => `
                <div class="order-card bg-white p-6 shadow-sm border border-slate-200">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Transaction ID</span>
                            <p class="text-xs font-mono text-slate-600">${order.txn}</p>
                        </div>
                        <span class="bg-amber-100 text-amber-700 text-[10px] font-black px-2 py-1 rounded">PENDING</span>
                    </div>

                    <div class="mb-4">
                        <h3 class="text-lg font-bold text-slate-800">${order.name}</h3>
                        <p class="text-sm text-slate-500"><i class="fa fa-phone mr-1"></i> ${order.phone}</p>
                    </div>

                    <div class="bg-slate-50 p-3 rounded-lg mb-4">
                        <p class="text-xs font-semibold text-slate-400 uppercase mb-1">Order Details</p>
                        <p class="text-sm text-slate-700 font-medium">${order.items}</p>
                        <div class="mt-2 pt-2 border-t border-slate-200 flex justify-between">
                            <span class="text-sm font-bold text-slate-800">Total Amount</span>
                            <span class="text-sm font-bold text-green-600">₹${order.total}</span>
                        </div>
                    </div>

                    <div class="text-xs text-slate-500 mb-6">
                        <i class="fa fa-map-marker-alt mr-1"></i> ${order.address}
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="updateStatus('${order.txn}', 'Confirmed', '${order.phone}')" class="btn-accept flex-1 text-white py-3 rounded-lg font-bold text-sm shadow-lg shadow-green-100 transition hover:bg-green-700">CONFIRM</button>
                        <button onclick="updateStatus('${order.txn}', 'Cancelled', '${order.phone}')" class="btn-reject flex-1 text-white py-3 rounded-lg font-bold text-sm shadow-lg shadow-red-100 transition hover:bg-red-700">CANCEL</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(txnId, newStatus, phone) {
            const btn = event.target;
            btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> Processing...`;
            btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action: "updateStatus", txn: txnId, status: newStatus })
                });

                const message = newStatus === 'Confirmed' 
                    ? `Order Confirmed! Your delicious meal from VIP Restaurant is being prepared.` 
                    : `Order Update: We regret to inform you that your order has been cancelled.`;

                window.open(`https://wa.me/91${phone}?text=${encodeURIComponent(message)}`, '_blank');
                fetchOrders(); 
            } catch (error) {
                alert("Operation failed. Check connection.");
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(fetchOrders, 30000);
        fetchOrders();
    </script>
</body>
</html>
