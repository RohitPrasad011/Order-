<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<style>
body{background:#111;color:#fff;font-family:Arial;padding:15px}
button{padding:6px 12px;margin:4px;border:none;border-radius:6px;cursor:pointer}
.card{border:1px solid #444;padding:10px;margin:10px 0;border-radius:8px}
.kot{background:#f4b400}
.bill{background:#0f9d58;color:#fff}
.paid{background:#d93025;color:#fff}
</style>
</head>
<body>

<h1>ADMIN PANEL</h1>
<button onclick="loadOrders()">Refresh</button>

<h2>Active Orders</h2>
<div id="orders"></div>

<script>

const ADMIN_ID="Rohitprasa";
const ADMIN_PASS="00000000";

if(!sessionStorage.getItem("login")){
 let id=prompt("Admin ID:");
 let pw=prompt("Password:");
 if(id!==ADMIN_ID||pw!==ADMIN_PASS){
   document.body.innerHTML="<h2>Access Denied</h2>";
   throw new Error("Stop");
 }
 sessionStorage.setItem("login","true");
}

const CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

let activeOrders={};

function parseCSV(text){
 let rows=[];
 let row=[];
 let cell="";
 let inside=false;

 for(let i=0;i<text.length;i++){
   let char=text[i];
   let next=text[i+1];

   if(char=='"' && inside && next=='"'){
     cell+='"';
     i++;
   }
   else if(char=='"'){
     inside=!inside;
   }
   else if(char==',' && !inside){
     row.push(cell);
     cell="";
   }
   else if((char=='\n' || char=='\r') && !inside){
     if(cell||row.length){
       row.push(cell);
       rows.push(row);
       row=[];
       cell="";
     }
   }
   else{
     cell+=char;
   }
 }
 return rows;
}

async function loadOrders(){
 activeOrders={};
 const res=await fetch(CSV_URL+"&t="+Date.now());
 const text=await res.text();
 const data=parseCSV(text);

 for(let i=1;i<data.length;i++){
   let table=data[i][1];
   let items=data[i][2];
   let total=parseFloat(data[i][3])||0;

   if(!table) continue;

   if(!activeOrders[table]){
     activeOrders[table]={items:[],total:0};
   }
   activeOrders[table].items.push(items);
   activeOrders[table].total+=total;
 }

 render();
}

function render(){
 let container=document.getElementById("orders");
 container.innerHTML="";

 for(let t in activeOrders){
   let o=activeOrders[t];
   container.innerHTML+=`
     <div class="card">
       <h3>Table: ${t}</h3>
       <pre>${o.items.join("\n\n")}</pre>
       <h4>Total: ₹${o.total}</h4>
       <button class="kot" onclick="printKOT('${t}')">Print KOT</button>
       <button class="bill" onclick="printBill('${t}')">Print Bill</button>
     </div>
   `;
 }
}

function printKOT(t){
 let o=activeOrders[t];
 let w=window.open("");
 w.document.write("<h2>KOT</h2><pre>"+o.items.join("\n")+"</pre>");
 w.print();
}

function printBill(t){
 let o=activeOrders[t];
 let w=window.open("");
 w.document.write("<h2>FINAL BILL</h2><hr>Table: "+t+
 "<pre>"+o.items.join("\n")+"</pre><hr><h3>Total: ₹"+o.total+"</h3>");
 w.print();
}

loadOrders();

</script>
</body>
</html>
