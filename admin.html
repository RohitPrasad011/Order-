<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Admin | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-white shadow p-4 sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-red-600 italic">VIP ADMIN</h1>
            <button onclick="loadOrders()" class="bg-gray-100 p-2 rounded-full active:scale-90 transition">
                <i class="fa fa-sync-alt text-gray-600"></i>
            </button>
        </div>
    </nav>

    <div class="max-w-xl mx-auto p-4" id="orderBox">
        <div class="text-center py-20 text-gray-400">Loading Orders...</div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-pNz_6HP34j97QQzUBPJrkwqB2zucq3M6y927LTNazuAapf9yE_IKat4oTfa6ApsB/exec";

        async function loadOrders() {
            try {
                const res = await fetch(SCRIPT_URL + "?action=getOrders", { redirect: 'follow' });
                const orders = await res.json();
                render(orders);
            } catch (e) {
                document.getElementById('orderBox').innerHTML = `<div class="bg-red-50 p-6 rounded-xl text-red-600 text-center font-bold">Connection Error. Click refresh.</div>`;
            }
        }

        function render(orders) {
            const box = document.getElementById('orderBox');
            if(!orders || orders.length === 0) { box.innerHTML = "No orders found."; return; }
            
            box.innerHTML = orders.reverse().map(o => `
                <div class="bg-white p-4 rounded-2xl shadow-sm mb-4 border border-gray-200">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[10px] font-bold text-gray-400 uppercase">${o.txn}</span>
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold ${o.status=='Pending'?'bg-orange-100 text-orange-600':'bg-green-100 text-green-600'}">${o.status}</span>
                    </div>
                    <h3 class="font-bold text-gray-800">${o.name} <span class="text-blue-500 text-xs ml-2">${o.phone}</span></h3>
                    <p class="text-sm text-gray-600 my-2">${o.items}</p>
                    <div class="flex gap-2 mt-4">
                        <button onclick="updateStatus('${o.txn}','Rejected','${o.phone}','${o.name}')" class="flex-1 py-2 text-xs font-bold text-red-500 uppercase">Reject</button>
                        <button onclick="updateStatus('${o.txn}','Confirmed','${o.phone}','${o.name}')" class="flex-1 bg-black text-white py-2 rounded-xl text-xs font-bold uppercase">Confirm</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStatus(txn, status, phone, name) {
            let dName = "", dPhone = "";
            if(status === 'Confirmed') {
                dName = prompt("Delivery Boy Name:");
                dPhone = prompt("Boy Phone:");
                if(!dName || !dPhone) return;
            }
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ action: "updateStatus", txn, status, dName, dPhone })
            });
            if(status === 'Confirmed') {
                window.open(`https://wa.me/91${phone}?text=Order Confirmed! Agent: ${dName}`, '_blank');
            }
            loadOrders();
        }
        window.onload = loadOrders;
    </script>
</body>
</html>
