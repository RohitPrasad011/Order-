<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Royal Food POS - Pro Fixed</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* --- App UI (Screen Mode) --- */
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; -webkit-tap-highlight-color:transparent; }
.card { background:#111827; border:1px solid #1f2937; border-radius:15px; padding:15px; margin-bottom:15px; }
.selected-card { border:2px solid #3b82f6 !important; background: #1e293b !important; }
.history-card { background:#0f172a; opacity:0.9; }
button { font-weight:700; font-size:13px; height:42px; border-radius:10px; cursor:pointer; }
.btn-kot { background:#ea580c; color:#fff; }
.btn-bill { background:#3b82f6; color:#fff; }
.btn-merge { background:#10b981; color:#fff; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; display:none; height:55px; z-index:100; }
pre { background:#000; padding:10px; border-radius:10px; white-space:pre-wrap; font-family:monospace; font-size:14px; color:#cbd5e1; border:1px solid #1f2937; pointer-events:none; }

/* 🔴🔥 ULTIMATE THERMAL PRINT FIX (A7/58mm) 🔥🔴 */
@media print {
    @page { 
        margin: 0 !important; 
        size: auto; 
    }
    html, body { 
        background: #fff !important; 
        color: #000 !important; 
        width: 100% !important;
        height: auto !important;
        margin: 0 !important; 
        padding: 0 !important; 
    }
    /* Hide everything except print area */
    body * { visibility: hidden !important; display: none !important; }
    
    #printSection, #printSection * { 
        visibility: visible !important; 
        display: block !important; 
        background: white !important; 
        color: black !important;
    }
    
    #printSection { 
        position: absolute; 
        left: 0; 
        top: 0; 
        width: 58mm !important; /* Standard Thermal Width */
        padding: 2mm !important; 
        margin: 0 !important;
        box-sizing: border-box;
        overflow: hidden !important;
    }
    
    .p-line { border-top: 1px dashed black !important; margin: 3px 0; width: 100%; }
    .bill-text { font-size: 12px !important; line-height: 1.2 !important; font-family: monospace !important; }
    center b { font-size: 15px !important; }
}

#printSection { display: none; }
.hidden { display: none; }
</style>
</head>

<body class="p-4 pb-32">

<header class="flex justify-between items-center mb-6 sticky top-0 bg-[#05070a] py-2 z-50">
  <h1 class="text-xl font-black text-white italic">ROYAL FOOD <span class="text-orange-500 font-bold">POS</span></h1>
  <div class="flex gap-2">
    <button onclick="toggleMergeMode()" id="mBtn" class="bg-gray-700 px-3 rounded text-[10px] uppercase">Merge</button>
    <button onclick="loadOrders()" class="bg-gray-800 px-3 rounded text-orange-400 text-[10px] border border-gray-700 uppercase">Refresh</button>
  </div>
</header>

<div id="orderList"></div>

<button onclick="toggleHistory()" class="w-full flex items-center gap-2 bg-gray-900 border border-gray-800 p-3 rounded-xl mb-4 mt-8">
    <span class="flex-1 text-center text-gray-500 text-[10px] font-bold uppercase tracking-widest">Order History ▼</span>
</button>
<div id="historyList" class="hidden"></div>

<button onclick="printMerged()" id="mergeBtn" class="btn-merge font-black italic uppercase">PRINT MERGED BILL (₹<span id="mergeTotal">0</span>)</button>

<div id="printSection"></div>

<script>
const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";
const HISTORY_KEY="royal_food_final_stable_v100";

let allOrders=[];
let selected=[];
let mergeMode=false;
let history=JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];

function parseCSV(text){
    const rows=[]; let row=[],cell="",inside=false;
    for(let i=0;i<text.length;i++){
        let c=text[i];
        if(c=='"'){inside=!inside}
        else if(c==","&&!inside){row.push(cell);cell=""}
        else if((c=="\n"||c=="\r")&&!inside){
            if(cell||row.length){row.push(cell);rows.push(row);row=[];cell=""}
        }else{cell+=c}
    }
    if(cell||row.length){row.push(cell);rows.push(row)}
    return rows;
}

async function loadOrders(){
    try {
        const res=await fetch(SHEET_URL+"&t="+Date.now());
        const data=await res.text();
        const rows = parseCSV(data).filter(r=>r[1]&&r[1].toLowerCase()!=="table");
        allOrders = rows.slice(-50); // Optimization for speed
        render();
    } catch(e) { console.log("Refresh failed"); }
}

function render(){
    const orderDiv=document.getElementById("orderList");
    const historyDiv=document.getElementById("historyList");
    orderDiv.innerHTML=""; historyDiv.innerHTML="";

    allOrders.slice().reverse().forEach((row)=>{
        const time=row[0], table=row[1], items=row[2]||"", total=row[3]||"0";
        const realIndex = allOrders.findIndex(r => r[0] === time && r[1] === table);
        const id=(table+time).replace(/\s/g,"");
        const isHistory=history.includes(id);
        const isSelected=selected.includes(realIndex);

        const card=document.createElement("div");
        card.className=`card ${isHistory?"history-card":""} ${isSelected?"selected-card":""}`;
        card.onclick=()=>selectCard(realIndex);

        card.innerHTML=`
        <div class="flex justify-between mb-2">
            <span class="font-bold text-lg italic uppercase text-white">${table}</span>
            <span class="text-green-400 font-bold text-xl">₹${total}</span>
        </div>
        <pre>${items.replace(/\\n/g,"\n")}</pre>
        ${!mergeMode?`
        <div class="flex gap-2 mt-3">
            <button class="btn-kot flex-1" onclick="event.stopPropagation();printDoc('KOT','${table}','${encodeURIComponent(items)}','')">KOT</button>
            <button class="btn-bill flex-1" onclick="event.stopPropagation();${isHistory?`printDoc('BILL','${table}','${encodeURIComponent(items)}','${total}')`:`printBill('${id}','${table}','${encodeURIComponent(items)}','${total}')`}">${isHistory?"REPRINT":"BILL"}</button>
        </div>`:""}
        `;
        if(isHistory) historyDiv.appendChild(card);
        else orderDiv.appendChild(card);
    });
    updateMergeUI();
}

function toggleHistory(){ document.getElementById("historyList").classList.toggle("hidden"); }
function toggleMergeMode(){
    mergeMode=!mergeMode;
    document.getElementById("mBtn").innerText = mergeMode ? "Cancel" : "Merge";
    if(!mergeMode) selected=[];
    render();
}
function selectCard(i){
    if(!mergeMode)return;
    const idx=selected.indexOf(i);
    if(idx>-1) selected.splice(idx,1);
    else selected.push(i);
    render();
}
function updateMergeUI(){
    const btn=document.getElementById("mergeBtn");
    const totalDisp=document.getElementById("mergeTotal");
    if(mergeMode&&selected.length>0){
        let sum=selected.reduce((a,i)=>a+(parseInt(allOrders[i][3])||0),0);
        totalDisp.innerText=sum;
        btn.style.display="block";
    } else { btn.style.display="none"; }
}

function printMerged(){
    let items="",sum=0,tables=[];
    selected.sort((a,b)=>a-b).forEach(i=>{
        items+=allOrders[i][2]+"\n";
        sum+=parseInt(allOrders[i][3])||0;
        if(!tables.includes(allOrders[i][1]))tables.push(allOrders[i][1]);
    });
    printDoc("BILL",tables.join("+"),encodeURIComponent(items),sum);
    toggleMergeMode();
}

function printBill(id,table,items,total){
    printDoc("BILL",table,items,total);
    if(!history.includes(id)){
        history.push(id);
        localStorage.setItem(HISTORY_KEY,JSON.stringify(history));
    }
    setTimeout(loadOrders,1000);
}

function printDoc(type,table,itemsEnc,total){
    const items=decodeURIComponent(itemsEnc).replace(/\\n/g,"\n");
    const area=document.getElementById("printSection");

    area.innerHTML = `
    <div style="width:52mm; font-family:monospace; color:black; background:white;">
        <center>
            <b style="font-size:15px;">ROYAL FOOD CORNER</b><br>
            <small style="font-size:9px;">Asansol, West Bengal</small>
        </center>
        <div class="p-line" style="border-top:1px dashed black; margin:4px 0;"></div>
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <b>${type}</b>
            <b>Table: ${table}</b>
        </div>
        <div style="font-size:9px;">${new Date().toLocaleString()}</div>
        <div class="p-line" style="border-top:1px dashed black; margin:4px 0;"></div>
        <div class="bill-text" style="white-space:pre-wrap; font-size:12px; margin:5px 0;">${items}</div>
        ${total ? `
        <div class="p-line" style="border-top:1px dashed black; margin:4px 0;"></div>
        <div style="display:flex; justify-content:space-between; font-size:15px; font-weight:bold;">
            <span>TOTAL</span>
            <span>₹${total}</span>
        </div>` : ""}
        <div class="p-line" style="border-top:1px dashed black; margin:4px 0;"></div>
        <center>
            <b style="font-size:10px;">Thank You 🙏 Visit Again!</b><br>
            <small style="font-size:8px;">Insta: @rpwebservice</small>
        </center>
    </div>
    `;

    area.style.display="block";
    window.print();
    setTimeout(() => { area.style.display="none"; area.innerHTML=""; }, 1000);
}

loadOrders();
setInterval(loadOrders, 15000);
</script>
</body>
</html>
