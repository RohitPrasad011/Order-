<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Admin - Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .order-card { border: 1px dashed #000 !important; box-shadow: none !important; width: 100% !important; margin: 0; border-radius: 0 !important; }
        }
        .accepted { opacity: 0.3; filter: grayscale(100%); pointer-events: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-10 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-slate-800 pb-8 no-print">
            <div>
                <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase"><i class="fas fa-terminal text-red-600"></i> Admin Terminal</h1>
                <p id="syncStatus" class="text-[10px] text-green-500 font-bold uppercase tracking-widest mt-1 italic">System Online</p>
            </div>
            <button onclick="fetchOrders()" class="bg-slate-800 p-4 rounded-2xl hover:bg-slate-700 transition-all border border-slate-700 active:scale-90">
                <i class="fas fa-sync-alt"></i>
            </button>
        </header>

        <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 text-center py-20">
            <p class="col-span-full text-slate-600 font-bold uppercase tracking-widest italic animate-pulse">Connecting to Google Sheets...</p>
        </div>
    </div>

    <script>
        // ✅ Correct Spreadsheet Configuration
        const SHEET_ID = "1slZX7KOLmywLkikGt-l0D0_QaOCBMWwPR9vO_PpFI6c";
        const SHEET_NAME = "Form Responses 1"; 
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;

        async function fetchOrders() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error("Failed to fetch");
                
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1).reverse(); // Show newest first
                const container = document.getElementById('ordersGrid');
                
                if (rows.length === 0 || rows[0].trim() === "") {
                    container.innerHTML = "<p class='col-span-full text-slate-500'>No orders found in database.</p>";
                    return;
                }

                container.innerHTML = "";

                rows.forEach((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 3) {
                        const time = cols[0].replace(/"/g, '');
                        const table = cols[1].replace(/"/g, '');
                        const items = cols[2].replace(/"/g, '').replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
                        const total = cols[3] ? cols[3].replace(/"/g, '') : "0";

                        container.innerHTML += `
                            <div class="order-card bg-slate-900 border border-slate-800 rounded-[2.5rem] p-8 shadow-2xl relative transition-all duration-500" id="order-${index}">
                                <div class="flex justify-between items-start mb-6 no-print">
                                    <span class="bg-red-600/20 text-red-500 text-[9px] font-black px-3 py-1 rounded-full uppercase italic">Pending</span>
                                    <span class="text-slate-700 font-black italic">#INV-${index}</span>
                                </div>
                                
                                <h2 class="text-3xl font-black text-white leading-none mb-1">${table}</h2>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-6">${time}</p>

                                <div class="bg-black/40 rounded-3xl p-6 mb-6 border border-slate-800/50 text-left">
                                    <p class="text-[9px] text-slate-600 font-black uppercase mb-3 border-b border-slate-800 pb-1 italic">Order List</p>
                                    <div class="text-sm font-medium text-slate-300 leading-relaxed italic">
                                        ${items}
                                    </div>
                                </div>

                                <div class="flex justify-between items-center mb-8 border-t border-slate-800 pt-6 px-2">
                                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Grand Total</span>
                                    <span class="text-2xl font-black text-green-400 font-mono italic">₹${total}</span>
                                </div>

                                <div class="flex gap-2 no-print">
                                    <button onclick="window.print()" class="flex-1 bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase active:scale-95 transition-all shadow-lg hover:bg-gray-200">
                                        <i class="fas fa-print mr-1"></i> Print Bill
                                    </button>
                                    <button onclick="acceptOrder(${index})" class="bg-slate-800 text-green-500 px-6 rounded-2xl border border-slate-700 hover:bg-green-600 hover:text-white transition-all">
                                        <i class="fas fa-check"></i>
                                    </button>
                                </div>
                                <div class="hidden text-green-500 font-black italic uppercase text-sm mt-4" id="label-${index}">Accepted ✅</div>
                            </div>
                        `;
                    }
                });
                
                document.getElementById('syncStatus').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('ordersGrid').innerHTML = `<p class='col-span-full text-red-500'>Connection Error! Check if Sheet is Public.</p>`;
            }
        }

        function acceptOrder(id) {
            document.getElementById(`order-${id}`).classList.add('accepted');
            document.getElementById(`label-${id}`).classList.remove('hidden');
        }

        // Auto Refresh every 10 seconds
        setInterval(fetchOrders, 10000);
        fetchOrders();
    </script>
</body>
</html>
