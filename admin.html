<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Admin - History Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #05070a; color: #e2e8f0; font-family: sans-serif; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .bill-card { background: #1a2234; border: 2px solid #3b82f6; border-radius: 16px; padding: 15px; }
        .history-card { background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 10px; opacity: 0.8; }
        pre { background: #000; padding: 8px; border-radius: 8px; font-size: 11px; color: #94a3b8; white-space: pre-wrap; margin: 8px 0; }
        button { font-weight: 800; text-transform: uppercase; font-size: 10px; height: 42px; border-radius: 8px; transition: 0.2s; }
        .btn-settle { background: #10b981; color: white; flex: 1; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="flex justify-between items-center mb-6 border-b border-slate-900 pb-4">
        <h1 class="text-xl font-black italic text-white">POS TERMINAL</h1>
        <button onclick="loadOrders()" class="bg-blue-600 text-white px-6 rounded-full">REFRESH</button>
    </header>

    <h2 class="text-[10px] font-bold text-orange-500 uppercase tracking-widest mb-3">1. New Incoming</h2>
    <div id="incomingContainer" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-10"></div>

    <h2 class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-3">2. Active Table Bills</h2>
    <div id="mergedContainer" class="flex flex-col gap-4 mb-10"></div>

    <hr class="border-slate-800 mb-10">

    <h2 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">3. History (Today's Settled)</h2>
    <div id="historyContainer" class="grid grid-cols-1 md:grid-cols-3 gap-3">
        </div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

let activeBills = JSON.parse(localStorage.getItem('pos_active_v5')) || {};
let processedIds = JSON.parse(localStorage.getItem('pos_ids_v5')) || [];
let historyBills = JSON.parse(localStorage.getItem('pos_history_v5')) || [];

async function loadOrders() {
    try {
        const res = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await res.text();
        const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
        
        const h = rows[0];
        const tIdx = h.findIndex(x => x.includes("Timestamp"));
        const bIdx = h.findIndex(x => x.includes("TABLE"));
        const iIdx = h.findIndex(x => x.includes("ITEMS"));
        const mIdx = h.findIndex(x => x.includes("MOUNT") || x.includes("TOTAL"));

        const incomingDiv = document.getElementById("incomingContainer");
        incomingDiv.innerHTML = "";

        for (let i = rows.length - 1; i >= 1; i--) {
            let d = rows[i];
            if (d.length < 3) continue;
            let orderId = (d[tIdx] + d[bIdx]).replace(/\s+/g, '');

            if (!processedIds.includes(orderId)) {
                let price = parseFloat(d[mIdx]) || 0;
                incomingDiv.innerHTML += `
                    <div class="card border-l-4 border-l-orange-500">
                        <div class="flex justify-between font-bold"><span>${d[bIdx]}</span><span class="text-green-400">₹${price}</span></div>
                        <pre>${d[iIdx]}</pre>
                        <div class="flex gap-2">
                            <button class="bg-slate-800 text-white flex-1" onclick="printDoc('KOT', '${d[bIdx]}', '${encodeURIComponent(d[iIdx])}')">KOT</button>
                            <button class="bg-blue-600 text-white flex-1" onclick="linkToBill('${d[bIdx]}', '${encodeURIComponent(d[iIdx])}', ${price}, '${orderId}')">Link Bill +</button>
                        </div>
                    </div>`;
            }
        }
        renderActive();
        renderHistory();
    } catch (e) { console.error("Sync Error"); }
}

function linkToBill(table, items, price, id) {
    if (!activeBills[table]) activeBills[table] = { items: [], total: 0, ids: [] };
    activeBills[table].items.push(decodeURIComponent(items));
    activeBills[table].total += price;
    activeBills[table].ids.push(id);
    processedIds.push(id);
    save(); loadOrders();
}

function renderActive() {
    const container = document.getElementById("mergedContainer");
    container.innerHTML = "";
    for (let t in activeBills) {
        let b = activeBills[t];
        container.innerHTML += `
            <div class="bill-card">
                <div class="flex justify-between mb-3"><h3 class="text-xl font-black text-white">${t}</h3><span class="text-2xl font-black text-green-400">₹${b.total}</span></div>
                <pre>${b.items.join('\n---\n')}</pre>
                <div class="flex gap-2">
                    <button class="bg-white text-black flex-1" onclick="printDoc('FINAL', '${t}', '${encodeURIComponent(b.items.join('\n'))}', ${b.total})">Print</button>
                    <button class="btn-settle" onclick="moveToHistory('${t}')">SETTLE (Move to History)</button>
                </div>
            </div>`;
    }
}

function renderHistory() {
    const container = document.getElementById("historyContainer");
    container.innerHTML = "";
    // Show last 10 settled bills
    historyBills.slice(-10).reverse().forEach(hb => {
        container.innerHTML += `
            <div class="history-card">
                <div class="flex justify-between text-[10px] text-slate-400 mb-1"><span>Table: ${hb.table}</span><span>${hb.time}</span></div>
                <div class="font-bold text-green-500 text-sm">₹${hb.total} Settled</div>
            </div>`;
    });
}

function moveToHistory(t) {
    if (confirm("Settle Table " + t + " and move to History?")) {
        let billData = activeBills[t];
        historyBills.push({
            table: t,
            total: billData.total,
            items: billData.items,
            time: new Date().toLocaleTimeString()
        });
        delete activeBills[t];
        save(); loadOrders();
    }
}

function printDoc(type, table, items, total = 0) {
    let w = window.open("");
    w.document.write(`<div style="font-family:monospace;width:280px;"><h2>${type}</h2><h1>${table}</h1><hr><pre>${decodeURIComponent(items)}</pre>${total ? '<hr><h3>Total: ₹'+total+'</h3>' : ''}</div>`);
    w.print(); w.close();
}

function save() {
    localStorage.setItem('pos_active_v5', JSON.stringify(activeBills));
    localStorage.setItem('pos_ids_v5', JSON.stringify(processedIds));
    localStorage.setItem('pos_history_v5', JSON.stringify(historyBills));
}

loadOrders();
setInterval(loadOrders, 15000);
</script>
</body>
</html>
