<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional POS Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f1a; color: #f1f5f9; font-family: sans-serif; font-size: 13px; }
        .order-card { background: #161e2e; border: 1px solid #2d3748; padding: 12px; border-radius: 10px; transition: 0.2s; cursor: pointer; position: relative; }
        .order-card.selected { border: 2px solid #3b82f6; background: #1e293b; shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .indicator { position: absolute; top: 8px; right: 8px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid #444; }
        .selected .indicator { background: #3b82f6; border-color: #fff; }
        .bill-card { background: #1a2234; border-top: 5px solid #3b82f6; padding: 20px; border-radius: 15px; }
        pre { background: #000; padding: 8px; color: #94a3b8; font-size: 11px; margin-top: 8px; border-radius: 5px; white-space: pre-wrap; }
        button { font-weight: 800; text-transform: uppercase; font-size: 10px; border-radius: 6px; transition: 0.2s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-2xl font-black text-red-600 italic tracking-tighter">ADMIN TERMINAL</h1>
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-[2px]">A-Z Management System</p>
        </div>
        <div class="flex gap-4">
            <button onclick="mergeSelected()" class="bg-green-600 hover:bg-green-500 text-white px-8 py-3 rounded-xl shadow-lg shadow-green-900/20">
                MERGE SELECTED ORDERS
            </button>
            <button onclick="loadOrders()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-xl">
                REFRESH
            </button>
        </div>
    </header>

    <h2 class="text-orange-500 font-bold mb-4 text-[10px] uppercase tracking-widest">1. Select Orders to Link</h2>
    <div id="incomingContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-16">
        </div>

    <hr class="border-slate-800 mb-10">

    <h2 class="text-blue-500 font-bold mb-4 text-[10px] uppercase tracking-widest">2. Final Table Billing Desk</h2>
    <div id="mergedContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";

let linkedBills = JSON.parse(localStorage.getItem('pos_linked_bills')) || {}; 
let processedIds = JSON.parse(localStorage.getItem('pos_processed_ids')) || [];
let selectedOrders = [];

async function loadOrders() {
    try {
        const res = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await res.text();
        const rows = text.split('\n').map(row => row.split(',').map(cell => cell.replace(/"/g, '').trim()));
        
        const headers = rows[0];
        const tIdx = headers.indexOf("Timestamp");
        const bIdx = headers.indexOf("TABLE NO.");
        const iIdx = headers.indexOf("ITEMS");
        const mIdx = headers.indexOf("TOTAL MOUNT");

        const container = document.getElementById("incomingContainer");
        container.innerHTML = "";

        for (let i = rows.length - 1; i >= 1; i--) {
            let data = rows[i];
            if (data.length < 3) continue;
            let id = (data[tIdx] + data[bIdx]).replace(/\s+/g, '');
            
            if (!processedIds.includes(id)) {
                let isSel = selectedOrders.find(o => o.id === id);
                container.innerHTML += `
                    <div class="order-card ${isSel ? 'selected' : ''}" id="card-${id}" onclick="toggleSelect('${id}', '${data[bIdx]}', '${encodeURIComponent(data[iIdx])}', ${data[mIdx]})">
                        <div class="indicator"></div>
                        <div class="flex justify-between font-bold text-white mb-1 pr-4">
                            <span>T: ${data[bIdx]}</span>
                            <span class="text-green-400">₹${data[mIdx]}</span>
                        </div>
                        <pre>${data[iIdx]}</pre>
                        <div class="flex gap-1 mt-3">
                            <button class="bg-orange-600 text-white flex-1 py-1 rounded" onclick="event.stopPropagation(); printDoc('KOT', '${data[bIdx]}', '${encodeURIComponent(data[iIdx])}')">KOT</button>
                            <button class="bg-slate-200 text-black flex-1 py-1 rounded" onclick="event.stopPropagation(); printDoc('BILL', '${data[bIdx]}', '${encodeURIComponent(data[iIdx])}', ${data[mIdx]})">PRINT</button>
                        </div>
                    </div>`;
            }
        }
        renderMergedBills();
    } catch (e) { console.log("Sync failed"); }
}

function toggleSelect(id, table, items, price) {
    let idx = selectedOrders.findIndex(o => o.id === id);
    if (idx > -1) {
        selectedOrders.splice(idx, 1);
        document.getElementById('card-'+id).classList.remove('selected');
    } else {
        selectedOrders.push({id, table, items: decodeURIComponent(items), price});
        document.getElementById('card-'+id).classList.add('selected');
    }
}

function mergeSelected() {
    if (selectedOrders.length === 0) return alert("Select at least one order!");
    
    let targetTable = prompt("Merge into which Table Number?", selectedOrders[0].table);
    if (!targetTable) return;

    if (!linkedBills[targetTable]) linkedBills[targetTable] = { items: [], total: 0 };
    
    selectedOrders.forEach(order => {
        linkedBills[targetTable].items.push(order.items);
        linkedBills[targetTable].total += parseFloat(order.price);
        processedIds.push(order.id);
    });

    selectedOrders = [];
    save(); loadOrders();
}

function renderMergedBills() {
    const mergedDiv = document.getElementById("mergedContainer");
    mergedDiv.innerHTML = "";
    for (let table in linkedBills) {
        let bill = linkedBills[table];
        mergedDiv.innerHTML += `
            <div class="bill-card shadow-2xl">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-2xl font-black text-white italic">${table}</h3>
                    <span class="text-[9px] bg-blue-900/50 text-blue-400 px-2 py-1 rounded border border-blue-800">ACTIVE BILL</span>
                </div>
                <div class="bg-black/50 p-4 rounded-xl text-xs text-slate-300 mb-5 border border-slate-800/50">
                    ${bill.items.map(i => `<div class='border-b border-white/5 py-2 last:border-0'>${i}</div>`).join('')}
                </div>
                <div class="flex justify-between font-black text-xl mb-6 text-green-400 pt-2">
                    <span>Grand Total:</span> <span>₹${bill.total}</span>
                </div>
                <div class="flex gap-3">
                    <button class="bg-white text-black flex-1 py-4 text-xs" onclick="printFinal('${table}')">PRINT FINAL</button>
                    <button class="bg-red-600 text-white flex-1 py-4 text-xs" onclick="settle('${table}')">SETTLE</button>
                </div>
            </div>`;
    }
}

function printDoc(type, table, items, price = 0) {
    let w = window.open("");
    w.document.write(`<html><body style="font-family:monospace; padding:20px; width:300px;">
        <center><h2>${type}</h2><h1>${table}</h1><hr></center>
        <pre style="white-space:pre-wrap;">${decodeURIComponent(items)}</pre>
        ${price ? '<hr><h3>Total: ₹'+price+'</h3>' : ''}
    </body></html>`);
    w.print(); w.close();
}

function printFinal(table) {
    let b = linkedBills[table];
    let w = window.open("");
    w.document.write(`<html><body style="font-family:monospace; padding:30px; width:300px;">
        <center><h2>FINAL INVOICE</h2><h1>${table}</h1><hr></center>
        <div style="margin:20px 0;">${b.items.join('<br>')}</div>
        <hr><h2 style="display:flex; justify-content:space-between;"><span>Total:</span> <span>₹${b.total}</span></h2><hr>
    </body></html>`);
    w.print(); w.close();
}

function settle(t) { if (confirm("Clear data for " + t + "?")) { delete linkedBills[t]; save(); loadOrders(); } }
function save() { localStorage.setItem('pos_linked_bills', JSON.stringify(linkedBills)); localStorage.setItem('pos_processed_ids', JSON.stringify(processedIds)); }
loadOrders();
</script>
</body>
</html>
