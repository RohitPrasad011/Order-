<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body { background:#000; color:white; font-family:Arial; padding:20px; }
.card { border:1px solid #444; padding:15px; margin:15px 0; border-radius:10px; }
button { padding:8px 12px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
.kot { background:#f4b400; }
.bill { background:#0f9d58; color:white; }
.paid { background:#d93025; color:white; }
.manual { background:#4285f4; color:white; }
</style>
</head>
<body>

<h1>ADMIN PANEL</h1>

<button onclick="loadOrders()">Refresh Orders</button>
<button class="manual" onclick="manualOrder()">Manual Order</button>

<div id="orders"></div>

<h2>Order History</h2>
<div id="history"></div>

<script>

const sheetURL = "PASTE_YOUR_CSV_LINK_HERE";

let historyOrders = [];

async function loadOrders(){
    const res = await fetch(sheetURL);
    const data = await res.text();
    const rows = data.split("\n").slice(1);

    let orders = {};

    rows.forEach(row=>{
        let cols = row.split(",");
        let table = cols[1];
        let items = cols[2];
        let total = parseFloat(cols[3]);

        if(!orders[table]){
            orders[table] = {items:[], total:0};
        }

        orders[table].items.push(items);
        orders[table].total += total;
    });

    displayOrders(orders);
}

function displayOrders(orders){
    let div = document.getElementById("orders");
    div.innerHTML = "";

    for(let table in orders){
        div.innerHTML += `
        <div class="card">
            <h2>Table: ${table}</h2>
            <p>Total: ₹${orders[table].total}</p>
            <button class="kot" onclick="printKOT('${table}')">Print KOT</button>
            <button class="bill" onclick="printBill('${table}', ${orders[table].total})">Print Bill</button>
            <button class="paid" onclick="markPaid('${table}', ${orders[table].total})">Mark Paid</button>
        </div>
        `;
    }
}

function printKOT(table){
    alert("Printing KOT for Table " + table);
    window.print();
}

function printBill(table,total){
    alert("Printing Bill for Table " + table + " ₹"+total);
    window.print();
}

function markPaid(table,total){
    historyOrders.push({table,total});
    document.getElementById("history").innerHTML += `
        <div class="card">
            Table: ${table} | ₹${total}
        </div>
    `;
    alert("Moved to History");
}

function manualOrder(){
    let table = prompt("Enter Table Number:");
    let amount = prompt("Enter Total Amount:");
    if(table && amount){
        document.getElementById("orders").innerHTML += `
        <div class="card">
            <h2>Table: ${table}</h2>
            <p>Total: ₹${amount}</p>
            <button class="kot" onclick="printKOT('${table}')">Print KOT</button>
            <button class="bill" onclick="printBill('${table}', ${amount})">Print Bill</button>
            <button class="paid" onclick="markPaid('${table}', ${amount})">Mark Paid</button>
        </div>
        `;
    }
}

loadOrders();

</script>

</body>
</html>
