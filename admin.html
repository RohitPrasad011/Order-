<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Admin - KOT & Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; }
            .order-card { 
                border: 1px dashed black !important; 
                box-shadow: none !important; 
                width: 100% !important; 
                border-radius: 0 !important;
                background: white !important;
                margin-bottom: 30px;
            }
            /* KOT मोड में अमाउंट छुपाना */
            .kot-mode .bill-only { display: none !important; }
            .kot-mode .kot-title { display: block !important; }
        }
        .kot-title { display: none; text-align: center; font-weight: bold; border-bottom: 2px solid black; margin-bottom: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-6 no-print">
            <h1 class="text-2xl font-black italic uppercase text-red-600">POS Terminal</h1>
            <button onclick="fetchOrders()" class="bg-slate-900 p-3 rounded-xl border border-slate-800"><i class="fas fa-sync-alt"></i></button>
        </header>

        <div class="flex gap-8 mb-8 border-b border-slate-800 no-print">
            <button onclick="switchTab('live')" id="tab-live" class="pb-4 text-sm font-black uppercase tab-active border-b-4 border-red-500">Live Orders</button>
            <button onclick="switchTab('history')" id="tab-history" class="pb-4 text-sm font-black uppercase text-slate-500">Accepted History</button>
        </div>

        <div id="ordersGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        const PUBLISHED_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";
        let currentTab = 'live';
        let acceptedOrders = JSON.parse(localStorage.getItem('pos_accepted_history')) || [];

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-live').className = tab === 'live' ? 'pb-4 text-sm font-black uppercase border-b-4 border-red-500' : 'pb-4 text-sm font-black uppercase text-slate-500';
            document.getElementById('tab-history').className = tab === 'history' ? 'pb-4 text-sm font-black uppercase border-b-4 border-red-500' : 'pb-4 text-sm font-black uppercase text-slate-500';
            fetchOrders();
        }

        async function fetchOrders() {
            try {
                const response = await fetch(PUBLISHED_URL + "&t=" + new Date().getTime());
                const csvText = await response.text();
                const rows = csvText.split('\n').filter(row => row.trim() !== "");
                const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
                
                const timestampIdx = headers.indexOf("Timestamp");
                const tableIdx = headers.indexOf("TABLE NO.");
                const itemsIdx = headers.indexOf("ITEMS");
                const totalIdx = headers.indexOf("TOTAL MOUNT");

                const container = document.getElementById('ordersGrid');
                container.innerHTML = "";
                const dataRows = rows.slice(1).reverse();

                dataRows.forEach((row) => {
                    const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g).map(c => c.replace(/"/g, ''));
                    const time = cols[timestampIdx];
                    const table = cols[tableIdx];
                    const items = cols[itemsIdx]?.replace(/\|/g, '<br>').replace(/\\n/g, '<br>') || "No items";
                    const total = cols[totalIdx] || "0";
                    const orderId = (time + table).replace(/\s+/g, '');

                    const isAccepted = acceptedOrders.includes(orderId);

                    if ((currentTab === 'live' && !isAccepted) || (currentTab === 'history' && isAccepted)) {
                        container.innerHTML += `
                            <div class="bg-slate-900 border border-slate-800 rounded-[2rem] p-6 shadow-xl relative order-card-wrapper" id="${orderId}">
                                <div class="kot-title">*** KITCHEN ORDER TICKET (KOT) ***</div>
                                <h2 class="text-3xl font-black text-white leading-none mb-1">${table}</h2>
                                <p class="text-[9px] text-slate-500 font-bold uppercase mb-4">${time}</p>
                                
                                <div class="bg-black/30 rounded-2xl p-4 mb-4 border border-slate-800 text-sm italic text-slate-300">
                                    ${items}
                                </div>

                                <div class="bill-only flex justify-between items-center mb-6 border-t border-slate-800 pt-4">
                                    <span class="text-xs font-bold text-slate-500 uppercase italic">Total</span>
                                    <span class="text-xl font-black text-green-400 font-mono italic">₹${total}</span>
                                </div>

                                <div class="flex flex-col gap-2 no-print">
                                    <div class="flex gap-2">
                                        <button onclick="printContent('${orderId}', 'kot')" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">KOT</button>
                                        <button onclick="printContent('${orderId}', 'bill')" class="flex-1 bg-white text-black py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">BILL</button>
                                    </div>
                                    ${!isAccepted ? `
                                    <button onclick="moveToHistory('${orderId}')" class="w-full bg-green-600 text-white py-2 rounded-xl hover:bg-green-500 transition-all">
                                        Confirm & Done <i class="fas fa-check ml-1"></i>
                                    </button>` : ''}
                                </div>
                            </div>
                        `;
                    }
                });
            } catch (err) { console.error(err); }
        }

        function printContent(id, type) {
            const wrapper = document.getElementById(id);
            if (type === 'kot') {
                document.body.classList.add('kot-mode');
            } else {
                document.body.classList.remove('kot-mode');
            }
            
            // सिर्फ उस खास कार्ड को प्रिंट करने के लिए बाकी सब छुपाना (साधारण तरीका)
            window.print();
        }

        function moveToHistory(id) {
            acceptedOrders.push(id);
            localStorage.setItem('pos_accepted_history', JSON.stringify(acceptedOrders));
            fetchOrders();
        }

        setInterval(fetchOrders, 10000);
        fetchOrders();
    </script>
</body>
</html>
