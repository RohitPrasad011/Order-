<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>My Resturant  - Pro v4 (Fixed)</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* --- App UI --- */
body { background:#05070a; color:#e2e8f0; font-family:sans-serif; -webkit-tap-highlight-color:transparent; }
.card { background:#111827; border:1px solid #1f2937; border-radius:15px; padding:15px; margin-bottom:15px; }
.selected-card { border:2px solid #3b82f6 !important; background: #1e293b !important; }
.history-card { background:#0f172a; opacity:0.8; border: 1px dashed #374151; }
button { font-weight:700; font-size:13px; height:42px; border-radius:10px; cursor:pointer; transition: 0.2s; }
.btn-kot { background:#ea580c; color:#fff; }
.btn-bill { background:#3b82f6; color:#fff; }
.btn-merge { background:#10b981; color:#fff; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:90%; max-width:400px; display:none; height:55px; z-index:100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
pre { background:#000; padding:10px; border-radius:10px; white-space:pre-wrap; font-family:monospace; font-size:14px; color:#cbd5e1; border:1px solid #1f2937; pointer-events:none; }

/* 🔥 PRINTER SETTINGS (58mm / 80mm Thermal Printer) 🔥 */
@media print {
    @page { margin: 0; size: auto; }
    html, body { background: #fff !important; color: #000 !important; width: auto !important; margin: 0 !important; padding: 0 !important; height: auto !important; }
    body * { visibility: hidden !important; display: none !important; }
    
    #printSection, #printSection * { 
        visibility: visible !important; 
        display: block !important; 
        background: white !important; 
        color: black !important;
    }
    
    #printSection { 
        display: block !important;
        position: absolute; 
        left: 0; top: 0; 
        width: 300px !important; /* Thermal Printer Width */
        max-width: 300px !important;
        margin: 0 auto !important;
        padding: 5mm !important; 
        box-sizing: border-box;
        page-break-inside: avoid !important; 
        font-family: "Courier New", Courier, monospace !important;
    }
    
    .p-line { border-top: 1px dashed black !important; margin: 5px 0; width: 100% !important; }
}

#printSection { display: none; width: 300px; margin: 0 auto; }
.hidden { display: none; }
</style>
</head>

<body class="p-4 pb-32">

<header class="flex justify-between items-center mb-6 sticky top-0 bg-[#05070a] py-2 z-50 border-b border-gray-800">
  <h1 class="text-xl font-black text-white italic">ROYAL FOOD <span class="text-orange-500">POS</span></h1>
  <div class="flex gap-2">
    <button onclick="toggleMergeMode()" id="mBtn" class="bg-gray-700 px-3 rounded text-[10px] uppercase border border-gray-600">Merge</button>
    <button onclick="loadOrders()" class="bg-gray-800 px-3 rounded text-orange-400 text-[10px] uppercase border border-gray-700">Refresh</button>
  </div>
</header>

<div id="orderList"></div>

<div class="my-8">
    <button onclick="toggleHistory()" class="w-full flex items-center gap-2 bg-gray-900 border border-gray-800 p-3 rounded-xl">
        <span class="flex-1 text-center text-gray-500 text-[10px] font-bold uppercase tracking-widest">History Options ▼</span>
    </button>
</div>
<div id="historyList" class="hidden"></div>

<button onclick="printMerged()" id="mergeBtn" class="btn-merge font-black italic uppercase text-lg">PRINT MERGED (₹<span id="mergeTotal">0</span>)</button>

<div id="printSection"></div>

<script>
const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTP_Hses8Fc-OoaI5zkdZlnhPL9VSXKJoIoopq-Td7GypERa_xC1Q5cl4zhwsk-ihrSB3v3k8C-yvAB/pub?output=csv";
const HISTORY_KEY="royal_pos_v50";

let allOrders=[];
let selected=[];
let mergeMode=false;
let history=JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];

function parseCSV(text){
    const rows=[]; let row=[],cell="",inside=false;
    for(let i=0;i<text.length;i++){
        let c=text[i];
        if(c=='"'){inside=!inside}
        else if(c==","&&!inside){row.push(cell);cell=""}
        else if((c=="\n"||c=="\r")&&!inside){
            if(cell||row.length){row.push(cell);rows.push(row);row=[];cell=""}
        }else{cell+=c}
    }
    if(cell||row.length){row.push(cell);rows.push(row)}
    return rows;
}

async function loadOrders(){
    try {
        const res=await fetch(SHEET_URL+"&t="+Date.now());
        const data=await res.text();
        const rows = parseCSV(data).filter(r=>r[1]&&r[1].toLowerCase()!=="table");
        allOrders = rows.slice(-50);
        render();
    } catch(e) { console.log("Network Error"); }
}

function render(){
    const orderDiv=document.getElementById("orderList");
    const historyDiv=document.getElementById("historyList");
    orderDiv.innerHTML=""; historyDiv.innerHTML="";

    allOrders.slice().reverse().forEach((row)=>{
        const time=row[0], table=row[1], items=row[2]||"", total=row[3]||"0";
        const realIndex = allOrders.findIndex(r => r[0] === time && r[1] === table);
        const id=(table+time).replace(/\s/g,"");
        const isHistory=history.includes(id);
        const isSelected=selected.includes(realIndex);

        const card=document.createElement("div");
        card.className=`card ${isHistory?"history-card":""} ${isSelected?"selected-card":""}`;
        card.onclick=()=>selectCard(realIndex);

        card.innerHTML=`
        <div class="flex justify-between mb-2">
            <span class="font-bold text-lg uppercase ${isHistory?'text-gray-500':'text-white'}">${table}</span>
            <span class="font-bold text-xl text-green-400">₹${total}</span>
        </div>
        <pre>${items.replace(/\\n/g,"\n")}</pre>
        ${!mergeMode?`
        <div class="flex gap-2 mt-3">
            <button class="btn-kot flex-1" onclick="event.stopPropagation();printDoc('KOT','${table}','${encodeURIComponent(items)}','')">KOT</button>
            <button class="btn-bill flex-1" onclick="event.stopPropagation();${isHistory?`printDoc('BILL','${table}','${encodeURIComponent(items)}','${total}')`:`printBill('${id}','${table}','${encodeURIComponent(items)}','${total}')`}">${isHistory?"REPRINT":"BILL"}</button>
        </div>`:""}
        `;
        if(isHistory) historyDiv.appendChild(card);
        else orderDiv.appendChild(card);
    });
    updateMergeUI();
}

function toggleHistory(){ document.getElementById("historyList").classList.toggle("hidden"); }

function toggleMergeMode(){
    mergeMode=!mergeMode;
    document.getElementById("mBtn").innerText = mergeMode ? "Cancel" : "Merge";
    document.getElementById("mBtn").classList.toggle("bg-red-600");
    if(!mergeMode) selected=[];
    render();
}

function selectCard(i){
    if(!mergeMode)return;
    const idx=selected.indexOf(i);
    if(idx>-1) selected.splice(idx,1);
    else selected.push(i);
    render();
}

function updateMergeUI(){
    const btn=document.getElementById("mergeBtn");
    const totalDisp=document.getElementById("mergeTotal");
    if(mergeMode&&selected.length>0){
        let sum=selected.reduce((a,i)=>a+(parseInt(allOrders[i][3])||0),0);
        totalDisp.innerText=sum;
        btn.style.display="block";
    } else { btn.style.display="none"; }
}

function printMerged(){
    let items="",sum=0,tables=[];
    selected.sort((a,b)=>a-b).forEach(i=>{
        items+=allOrders[i][2]+"\n";
        sum+=parseInt(allOrders[i][3])||0;
        if(!tables.includes(allOrders[i][1]))tables.push(allOrders[i][1]);
    });
    printDoc("BILL",tables.join("+"),encodeURIComponent(items),sum);
    toggleMergeMode();
}

function printBill(id,table,items,total){
    printDoc("BILL",table,items,total);
    if(!history.includes(id)){
        history.push(id);
        localStorage.setItem(HISTORY_KEY,JSON.stringify(history));
    }
    setTimeout(loadOrders,1000);
}

function printDoc(type,table,itemsEnc,total){
    const items=decodeURIComponent(itemsEnc).replace(/\\n/g,"\n");
    const area=document.getElementById("printSection");

    // ✅ Fixed Print Layout for Thermal Printer
    area.innerHTML = `
    <div style="width: 100%; font-family: 'Courier New', monospace; color: black; background: white; font-size: 14px;">
        <center>
            <b style="font-size: 20px;">ROYAL FOOD CORNER</b><br>
            <small>Asansol, West Bengal</small>
        </center>
        <div class="p-line"></div>
        <div style="display: flex; justify-content: space-between; font-size: 14px;">
            <b>${type}</b>
            <b>Table: ${table}</b>
        </div>
        <div style="font-size: 11px;">${new Date().toLocaleString()}</div>
        <div class="p-line"></div>
        
        <div style="font-size: 16px; white-space: pre-wrap; line-height: 1.4; margin: 10px 0;">${items}</div>
        
        ${total ? `
        <div class="p-line"></div>
        <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: bold;">
            <span>TOTAL:</span>
            <span>₹${total}</span>
        </div>` : ""}
        
        <div style="border-top: 2px solid black; margin: 15px 0 5px 0;"></div>
        <center>
            <b style="font-size: 13px;">Thank You 🙏 Visit Again!</b><br>
            <small style="font-size: 10px;">RP Web Service</small>
        </center>
    </div>
    `;

    area.style.display="block";
    
    // Small delay to ensure DOM is ready
    setTimeout(() => {
        window.print();
    }, 300);
}

loadOrders();
setInterval(loadOrders, 15000);
</script>
</body>
</html>
